<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI Video Experiment</title><link rel="stylesheet" href="shared/styles.css"></head><body>
<div class="app-shell"><div class="phone"><div class="screen">
<div class="statusbar"><span>9:41</span><span>AI Video Study</span></div>
<div class="content">
  <div class="card">
    <h1 class="start-title" id="startTitle"></h1>
    <p class="small" id="startDescription"></p>
    <div class="guide-list">
      <div><b>1</b><span id="guide1"></span></div>
      <div><b>2</b><span id="guide2"></span></div>
      <div><b>3</b><span id="guide3"></span></div>
      <div><b>4</b><span id="guide4"></span></div>
    </div>
  </div>
  <div class="card">
    <h2 class="card-title" id="languageTitle"></h2>
    <div class="cond-row language-row">
      <button class="option-card active" data-lang="ko"><strong>한국어</strong><span>Korean</span></button>
      <button class="option-card" data-lang="en"><strong>English</strong><span>English</span></button>
      <button class="option-card" data-lang="zh"><strong>中文</strong><span>Chinese</span></button>
    </div>
  </div>
  <div class="card">
    <label class="field-label" for="nickInput" id="nicknameLabel">참가자 닉네임</label>
    <input class="text-input" id="nickInput" type="text" maxlength="20">
    <p class="small" id="nicknameHelp"></p>
  </div>
  <div class="card">
    <h2 class="card-title" id="scenarioTitle">시나리오 선택</h2>
    <div class="cond-row">
      <button class="option-card" data-s="dating"><strong id="datingStrong"></strong><span id="datingSub"></span></button>
      <button class="option-card active" data-s="sns"><strong id="snsStrong"></strong><span id="snsSub"></span></button>
    </div>
  </div>
  <div class="card">
    <h2 class="card-title" id="conditionTitle">조건 선택</h2>
    <div class="cond-row">
      <button class="option-card active" data-c="c1"><strong>C1</strong><span>High AA · High PTS</span></button>
      <button class="option-card" data-c="c2"><strong>C2</strong><span>High AA · Low PTS</span></button>
      <button class="option-card" data-c="c3"><strong>C3</strong><span>Low AA · High PTS</span></button>
      <button class="option-card" data-c="c4"><strong>C4</strong><span>Low AA · Low PTS</span></button>
    </div>
  </div>
</div>
<div class="footer"><button class="btn full" id="startBtn"></button></div>
</div></div></div>
<script src="shared/data.js"></script><script>
let s='sns';
const params=new URLSearchParams(location.search);
const fast=params.get('fast')==='1';
const lang=window.EXP_LANG || 'ko';
const ui=window.EXP_UI;
let selectedCondition=params.get('c') || 'c1';
document.documentElement.lang=lang;

function applyLanguage(){
  startTitle.textContent=ui.start.title;
  startDescription.textContent=ui.start.description;
  guide1.textContent=ui.start.guide[0];
  guide2.textContent=ui.start.guide[1];
  guide3.textContent=ui.start.guide[2];
  guide4.textContent=ui.start.guide[3];
  languageTitle.textContent=ui.start.languageTitle;
  nicknameLabel.textContent=ui.start.nicknameLabel;
  nickInput.placeholder=ui.start.nicknamePlaceholder;
  nicknameHelp.textContent=ui.start.nicknameHelp;
  scenarioTitle.textContent=ui.start.scenarioTitle;
  datingStrong.textContent=ui.start.scenarioDatingStrong;
  datingSub.textContent=ui.start.scenarioDatingSub;
  snsStrong.textContent=ui.start.scenarioSnsStrong;
  snsSub.textContent=ui.start.scenarioSnsSub;
  conditionTitle.textContent=ui.start.conditionTitle;
  startBtn.textContent=ui.start.startButton;
}
document.querySelectorAll('[data-s]').forEach(btn=>{
  btn.classList.toggle('active',btn.dataset.s===s);
  btn.onclick=()=>{s=btn.dataset.s;document.querySelectorAll('[data-s]').forEach(b=>b.classList.remove('active'));btn.classList.add('active')};
});
document.querySelectorAll('[data-c]').forEach(btn=>{
  btn.classList.toggle('active',btn.dataset.c===selectedCondition);
  btn.onclick=()=>{
    selectedCondition=btn.dataset.c;
    document.querySelectorAll('[data-c]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
});
document.querySelectorAll('[data-lang]').forEach(btn=>{
  btn.classList.toggle('active',btn.dataset.lang===lang);
  btn.onclick=()=>{
    const next=new URLSearchParams(location.search);
    next.set('lang',btn.dataset.lang);
    next.set('c',selectedCondition);
    if(fast) next.set('fast','1');
    location.href=`index.html?${next.toString()}`;
  };
});
applyLanguage();
document.getElementById('startBtn').onclick=()=>{
  const nick=nickInput.value.trim() || (ui.start.missingNickname || 'creator');
  const next=new URLSearchParams({s,c:selectedCondition,nick,lang});
  if(fast) next.set('fast','1');
  location.href=`apps/video_ai/sns/index.html?${next.toString()}`;
};
</script></body></html>
