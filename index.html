<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI Video Experiment</title><link rel="stylesheet" href="shared/styles.css"></head><body>
<div class="app-shell"><div class="phone"><div class="screen">
<div class="statusbar"><span>9:41</span><span>AI Video Study</span></div>
<div class="content">
  <div class="card">
    <h1 class="start-title" id="startTitle"></h1>
    <p class="small" id="startDescription"></p>
    <div class="guide-list">
      <div><b>1</b><span id="guide1"></span></div>
      <div><b>2</b><span id="guide2"></span></div>
    </div>
    <p class="small" id="privacyNote"></p>
  </div>
  <div class="card">
    <h2 class="card-title" id="languageTitle"></h2>
    <div class="cond-row language-row">
      <button class="option-card active" data-lang="ko"><strong>한국어</strong><span>Korean</span></button>
      <button class="option-card" data-lang="en"><strong>English</strong><span>English</span></button>
      <button class="option-card" data-lang="zh"><strong>中文</strong><span>Chinese</span></button>
    </div>
  </div>
</div>
<div class="footer"><button class="btn full" id="startBtn"></button></div>
</div></div></div>
<script src="shared/data.js"></script><script>
const params=new URLSearchParams(location.search);
const fast=params.get('fast')==='1';
const lang=window.EXP_LANG || 'ko';
const ui=window.EXP_UI;
const CONDITIONS=['c1','c2','c3','c4'];
const GOOGLE_SHEETS_WEB_APP_URL=window.GOOGLE_SHEETS_WEB_APP_URL || '';
document.documentElement.lang=lang;

function applyLanguage(){
  startTitle.textContent=ui.start.title;
  startDescription.textContent=ui.start.description;
  guide1.textContent=ui.start.guide[0];
  guide2.textContent=ui.start.guide[1];
  privacyNote.textContent=ui.start.privacy||'';
  languageTitle.textContent=ui.start.languageTitle;
  startBtn.textContent=ui.start.startButton;
}
document.querySelectorAll('[data-lang]').forEach(btn=>{
  btn.classList.toggle('active',btn.dataset.lang===lang);
  btn.onclick=()=>{
    const next=new URLSearchParams(location.search);
    next.set('lang',btn.dataset.lang);
    next.delete('c');
    if(fast) next.set('fast','1');
    location.href=`index.html?${next.toString()}`;
  };
});
function jsonp(url, timeout=3500){
  return new Promise((resolve,reject)=>{
    const callback='rmAssign_'+Date.now().toString(36)+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{
      cleanup();
      reject(new Error('timeout'));
    }, timeout);
    function cleanup(){
      clearTimeout(timer);
      script.remove();
      delete window[callback];
    }
    window[callback]=data=>{
      cleanup();
      resolve(data);
    };
    const sep=url.includes('?')?'&':'?';
    script.src=url+sep+'mode=counts&scenario=sns&callback='+encodeURIComponent(callback);
    script.onerror=()=>{
      cleanup();
      reject(new Error('load-failed'));
    };
    document.body.appendChild(script);
  });
}
async function assignCondition(){
  if(fast && CONDITIONS.includes(params.get('c'))) return params.get('c');
  try{
    const counts=await jsonp(GOOGLE_SHEETS_WEB_APP_URL);
    const normalized=Object.fromEntries(CONDITIONS.map(c=>[c, Number(counts && counts[c]) || 0]));
    const min=Math.min(...CONDITIONS.map(c=>normalized[c]));
    const candidates=CONDITIONS.filter(c=>normalized[c]===min);
    return candidates[Math.floor(Math.random()*candidates.length)];
  }catch(err){
    return CONDITIONS[Math.floor(Math.random()*CONDITIONS.length)];
  }
}
applyLanguage();
document.getElementById('startBtn').onclick=async()=>{
  startBtn.disabled=true;
  startBtn.textContent=ui.start.assigning;
  const assignedCondition=await assignCondition();
  const next=new URLSearchParams({s:'sns',c:assignedCondition,lang});
  if(fast) next.set('fast','1');
  location.href=`apps/messenger/sns/index.html?${next.toString()}`;
};
</script></body></html>
