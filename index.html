<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Simulation</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f0e8; --sidebar-bg:#faf7f2; --header-bg:#faf7f2; --border:#e8e0d0;
    --accent:#d4570a; --accent-light:#fde8d8; --accent-hover:#b84708;
    --user-bubble:#d4570a; --user-text:#fff;
    --ai-bubble:#ede8df; --ai-text:#1a1208; --system-text:#8c7e6a;
    --decision-bg:#fff8ec; --decision-border:#e8a43a;
    --ai-decision-bg:#ede0f5; --ai-decision-border:#9b59b6;
    --final-bg:#e6f4ea; --final-border:#34a853;
    --font:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font);background:var(--bg);height:100vh;display:flex;overflow:hidden;color:var(--ai-text);}

  /* SIDEBAR */
  .sidebar{width:272px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
  .sidebar-top{padding:18px 16px 12px;border-bottom:1px solid var(--border);}
  .lang-switcher{display:flex;gap:4px;margin-bottom:14px;}
  .lang-btn{flex:1;padding:6px 0;font-size:12px;font-weight:600;font-family:var(--font);border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--system-text);cursor:pointer;transition:all .15s;}
  .lang-btn:hover{border-color:var(--accent);color:var(--accent);}
  .lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .sidebar-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--system-text);margin-bottom:8px;}
  .cond-list{padding:10px 10px 0;}
  .condition-btn{display:flex;flex-direction:column;gap:4px;width:100%;padding:11px 13px;margin-bottom:3px;border:1.5px solid transparent;border-radius:10px;background:transparent;cursor:pointer;text-align:left;transition:all .15s;font-family:var(--font);}
  .condition-btn:hover{background:var(--accent-light);}
  .condition-btn.active{background:var(--accent-light);border-color:var(--accent);}
  .condition-btn .c-label{font-size:12.5px;font-weight:700;color:#1a1208;}
  .condition-btn.active .c-label{color:var(--accent);}
  .condition-btn .c-desc{font-size:11px;color:var(--system-text);line-height:1.4;}
  .badge-row{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
  .badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
  .badge.aa-h{background:#fde8d8;color:#b84708;} .badge.aa-l{background:#ede0f5;color:#7b2fbe;}
  .badge.mp-h{background:#fef3c7;color:#92400e;} .badge.mp-l{background:#dcfce7;color:#15803d;}
  .sidebar-divider{height:1px;background:var(--border);margin:12px 16px;}
  .sidebar-note{font-size:11px;color:var(--system-text);padding:0 16px 16px;line-height:1.7;}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;min-width:0;}
  .tab-row{display:flex;background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;}
  .tab-btn{padding:13px 16px;font-size:13px;font-weight:500;font-family:var(--font);background:transparent;border:none;border-bottom:2.5px solid transparent;cursor:pointer;color:var(--system-text);transition:color .15s;white-space:nowrap;}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .chat-header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:11px;flex-shrink:0;}
  .agent-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d4570a,#e8852a);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
  .h-name{font-size:15px;font-weight:600;color:#1a1208;}
  .h-status{font-size:12px;color:var(--system-text);}
  .condition-tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-light);padding:2px 9px;border-radius:20px;margin-left:8px;}

  /* MESSAGES */
  .chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;}
  .msg-row{display:flex;align-items:flex-end;gap:8px;opacity:0;transform:translateY(10px);transition:opacity .3s ease,transform .3s ease;}
  .msg-row.show{opacity:1;transform:translateY(0);}
  .msg-row.user{flex-direction:row-reverse;}
  .msg-row.system-row{justify-content:center;margin:4px 0;}
  .avatar-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#d4570a,#e8852a);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-bottom:2px;}
  .bubble{max-width:66%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:keep-all;}
  .bubble.user{background:var(--user-bubble);color:var(--user-text);border-bottom-right-radius:4px;}
  .bubble.ai{background:var(--ai-bubble);color:var(--ai-text);border-bottom-left-radius:4px;}
  .system-label{font-size:11px;color:var(--system-text);padding:3px 12px;background:var(--border);border-radius:20px;}

  /* CHOICE BUTTONS */
  .choice-row{
    display:flex; flex-direction:column; gap:7px;
    align-items:flex-end;
    padding: 4px 0 8px 40px;
    opacity:0; transform:translateY(8px);
    transition:opacity .3s ease, transform .3s ease;
  }
  .choice-row.show{opacity:1;transform:translateY(0);}
  .choice-row.disabled .choice-btn{pointer-events:none;opacity:0.45;}

  .choice-btn{
    display:inline-block;
    padding:9px 16px;
    background:#fff;
    border:1.5px solid var(--border);
    border-radius:18px;
    font-size:13px; font-weight:500;
    font-family:var(--font);
    color:var(--ai-text);
    cursor:pointer;
    text-align:left;
    transition:border-color .15s, background .15s, transform .1s;
    max-width:72%;
    word-break:keep-all;
    line-height:1.5;
  }
  .choice-btn:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
  .choice-btn:active{transform:scale(.97);}
  .choice-label{font-weight:700;color:var(--accent);margin-right:4px;flex-shrink:0;}
  .choice-btn.selected .choice-label{color:#fff;}
  .choice-btn.selected{
    border-color:var(--accent);
    background:var(--accent);
    color:#fff;
    pointer-events:none;
  }

  /* DECIDE BUTTON (single confirm) */
  .decide-row{
    display:flex; justify-content:flex-end;
    padding:4px 0 8px 40px;
    opacity:0; transform:translateY(8px);
    transition:opacity .3s ease, transform .3s ease;
  }
  .decide-row.show{opacity:1;transform:translateY(0);}
  .decide-btn{
    padding:10px 20px;
    background:var(--accent); color:#fff;
    border:none; border-radius:20px;
    font-size:13px; font-weight:600;
    font-family:var(--font); cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .decide-btn:hover{background:var(--accent-hover);}
  .decide-btn:active{transform:scale(.97);}
  .decide-btn:disabled{opacity:.4;cursor:not-allowed;}

  /* CARDS */
  .decision-card{max-width:70%;padding:13px 15px;border-radius:14px;font-size:13.5px;line-height:1.6;margin:4px 0;}
  .decision-card.user-decide{background:var(--decision-bg);border:1.5px solid var(--decision-border);border-bottom-right-radius:4px;}
  .decision-card.ai-decide{background:var(--ai-decision-bg);border:1.5px solid var(--ai-decision-border);border-bottom-left-radius:4px;}
  .card-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;opacity:.65;}
  .card-body{font-size:13px;line-height:1.55;}
  .result-card{max-width:72%;padding:14px 16px;border-radius:14px;background:var(--final-bg);border:1.5px solid var(--final-border);font-size:13.5px;line-height:1.6;margin:4px 0;border-bottom-left-radius:4px;}
  .rc-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#1a6130;margin-bottom:5px;}
  .rc-title{font-weight:700;font-size:15px;color:#1a6130;}
  .rc-body{color:#1a4a28;margin-top:4px;font-size:12.5px;}
  .video-link-btn{display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:8px 14px;background:#34a853;color:#fff;border:none;border-radius:8px;font-size:12.5px;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .2s;text-decoration:none;}
  .video-link-btn:hover{opacity:.85;}
  .video-link-btn.no-link{background:#aaa;cursor:default;pointer-events:none;opacity:.6;}

  /* TYPING + PROC */
  .typing-wrap{padding:5px 24px 3px;min-height:52px;display:flex;flex-direction:column;justify-content:center;gap:3px;flex-shrink:0;}
  .typing-row{display:flex;align-items:center;gap:8px;}
  .typing-dots{background:var(--ai-bubble);border-radius:18px;padding:9px 14px;display:none;gap:4px;align-items:center;}
  .typing-dots.visible{display:flex;}
  .typing-dots span{width:6px;height:6px;border-radius:50%;background:#aaa;animation:tdot 1.2s infinite;}
  .typing-dots span:nth-child(2){animation-delay:.2s;}
  .typing-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
  .proc-status{display:flex;align-items:center;gap:5px;padding-left:36px;font-size:11px;color:var(--system-text);height:14px;opacity:0;transition:opacity .3s;}
  .proc-status.visible{opacity:1;}
  .proc-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pdot 1.4s ease-in-out infinite;}
  @keyframes pdot{0%,100%{opacity:.25}50%{opacity:1}}

  /* FOOTER */
  .chat-footer{border-top:1px solid var(--border);background:var(--header-bg);padding:13px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .play-btn{padding:9px 20px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s,transform .1s;}
  .play-btn:hover{background:var(--accent-hover);}
  .play-btn:active{transform:scale(.97);}
  .play-btn:disabled{opacity:.4;cursor:not-allowed;}
  .reset-btn{padding:9px 15px;background:transparent;color:var(--system-text);border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;transition:background .15s;}
  .reset-btn:hover{background:var(--accent-light);}
  .footer-info{margin-left:auto;font-size:11.5px;color:var(--system-text);}

  /* SURVEY */
  .survey-section{display:none;flex:1;overflow-y:auto;padding:28px 36px 36px;background:var(--bg);}
  .survey-section.active{display:block;}
  .survey-header{margin-bottom:24px;}
  .survey-header h2{font-size:19px;font-weight:700;color:#1a1208;margin-bottom:5px;}
  .survey-header p{font-size:12.5px;color:var(--system-text);line-height:1.6;}
  .survey-block{background:var(--sidebar-bg);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;}
  .survey-block-title{font-size:11px;font-weight:700;color:var(--system-text);text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .survey-item{margin-bottom:22px;}
  .survey-item:last-child{margin-bottom:0;}
  .survey-q{font-size:13.5px;font-weight:500;color:#1a1208;margin-bottom:10px;line-height:1.55;}
  .q-num{font-weight:700;color:var(--accent);margin-right:3px;}
  .measure-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:5px;vertical-align:middle;}
  .measure-tag.direct{background:#fde8d8;color:#b84708;}
  .measure-tag.indirect{background:#ede0f5;color:#7b2fbe;}
  .likert-wrap{display:flex;align-items:center;gap:8px;}
  .likert-end{font-size:11px;color:var(--system-text);min-width:64px;line-height:1.3;}
  .likert-end.r{text-align:right;}
  .likert-options{display:flex;gap:5px;flex:1;justify-content:center;}
  .likert-opt{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
  .likert-opt input{display:none;}
  .likert-circle{width:33px;height:33px;border-radius:50%;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;color:var(--system-text);transition:all .15s;cursor:pointer;}
  .likert-opt:hover .likert-circle{border-color:var(--accent);color:var(--accent);}
  .likert-opt input:checked + .likert-circle{background:var(--accent);border-color:var(--accent);color:#fff;}
  .survey-submit{display:block;width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:6px;transition:background .15s;}
  .survey-submit:hover{background:var(--accent-hover);}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-top">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" onclick="setLang('en')">English</button>
      <button class="lang-btn" onclick="setLang('zh')">中文</button>
    </div>
    <div class="sidebar-label" id="lb-conditions">실험 조건</div>
  </div>
  <div class="cond-list">
    <button class="condition-btn active" onclick="selectCondition('c1')" id="btn-c1">
      <div class="c-label">C1 — High AA × High MP</div>
      <div class="badge-row"><span class="badge aa-h" id="b-aah-1"></span><span class="badge mp-h" id="b-mph-1"></span></div>
      <div class="c-desc" id="lb-c1-desc"></div>
    </button>
    <button class="condition-btn" onclick="selectCondition('c2')" id="btn-c2">
      <div class="c-label">C2 — High AA × Low MP</div>
      <div class="badge-row"><span class="badge aa-h" id="b-aah-2"></span><span class="badge mp-l" id="b-mpl-2"></span></div>
      <div class="c-desc" id="lb-c2-desc"></div>
    </button>
    <button class="condition-btn" onclick="selectCondition('c3')" id="btn-c3">
      <div class="c-label">C3 — Low AA × High MP</div>
      <div class="badge-row"><span class="badge aa-l" id="b-aal-3"></span><span class="badge mp-h" id="b-mph-3"></span></div>
      <div class="c-desc" id="lb-c3-desc"></div>
    </button>
    <button class="condition-btn" onclick="selectCondition('c4')" id="btn-c4">
      <div class="c-label">C4 — Low AA × Low MP</div>
      <div class="badge-row"><span class="badge aa-l" id="b-aal-4"></span><span class="badge mp-l" id="b-mpl-4"></span></div>
      <div class="c-desc" id="lb-c4-desc"></div>
    </button>
  </div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-note" id="lb-note"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="tab-row">
    <button class="tab-btn active" id="tab-chat" onclick="switchTab('chat')"></button>
    <button class="tab-btn" id="tab-survey" onclick="switchTab('survey')"></button>
  </div>
  <div class="chat-header" id="chat-header-wrap">
    <div class="agent-avatar">✦</div>
    <div>
      <div class="h-name">VideoAI <span class="condition-tag" id="condition-tag">C1</span></div>
      <div class="h-status" id="lb-agent-status"></div>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg-row system-row show">
      <div class="system-label" id="lb-start-hint"></div>
    </div>
  </div>
  <div class="typing-wrap" id="typing-wrap">
    <div class="typing-row">
      <div style="width:28px;flex-shrink:0"></div>
      <div class="typing-dots" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div class="proc-status" id="proc-status">
      <div class="proc-dot"></div>
      <span id="proc-text"></span>
    </div>
  </div>
  <div class="chat-footer" id="chat-footer-wrap">
    <button class="play-btn" id="play-btn" onclick="startSimulation()"></button>
    <button class="reset-btn" id="reset-btn" onclick="resetChat()"></button>
    <span class="footer-info" id="footer-info">C1</span>
  </div>
  <div class="survey-section" id="survey-section"></div>
</div>

<script>
// ══════════════════════════════════════════════
//  VIDEO URLS
// ══════════════════════════════════════════════
const VIDEO_URLS = {
  c1: 'vedio_sample/high_pressure.mp4',   // High AA × High MP
  c2: 'vedio_sample/low_pressure.mp4',    // High AA × Low MP
  c3: 'vedio_sample/high_pressure.mp4',   // Low AA  × High MP
  c4: 'vedio_sample/low_pressure.mp4',    // Low AA  × Low MP
};

// ══════════════════════════════════════════════
//  PROCESSING MESSAGES
// ══════════════════════════════════════════════
const PROC = {
  ko:{ thinking:['응답 생성 중...','문맥 분석 중...','답변 구성 중...'], editing:['클립 분석 중...','편집 구성 중...','타임라인 정리 중...','자막 적용 중...'], rendering:['클립 렌더링 중...','영상 인코딩 중...','최종 출력 중...'] },
  en:{ thinking:['Generating response...','Analyzing context...','Composing reply...'], editing:['Analyzing clips...','Building edit structure...','Arranging timeline...','Applying captions...'], rendering:['Rendering clips...','Encoding video...','Finalizing output...'] },
  zh:{ thinking:['正在生成回复...','分析上下文...','构建回答...'], editing:['分析片段...','构建剪辑结构...','整理时间线...','添加字幕...'], rendering:['渲染片段...','编码视频...','最终输出...'] },
};

// ══════════════════════════════════════════════
//  I18N
// ══════════════════════════════════════════════
const T = {
  ko:{
    conditions:'실험 조건', aa_h:'AI자율성↑', aa_l:'AI자율성↓', mp_h:'도덕압박↑', mp_l:'도덕압박↓',
    c1_desc:'할로윈 창피 영상 · 선택형 · 사용자 결정',
    c2_desc:'놀이공원 추억 · 선택형 · 사용자 결정',
    c3_desc:'할로윈 창피 영상 · 자동 · AI 결정',
    c4_desc:'놀이공원 추억 · 자동 · AI 결정',
    note:'MV: 심리적 소유감\nDV: 죄책감\n2×2 between-subjects\nn=120 (~30/condition)',
    tab_chat:'💬 채팅 시뮬레이션', tab_survey:'📋 설문 문항',
    agent_status:'영상 제작 도우미',
    start_hint:'조건을 선택하고 시뮬레이션 시작을 눌러주세요',
    btn_start:'▶ 시뮬레이션 시작', btn_reset:'↺ 초기화', btn_replay:'↺ 다시 재생',
    watch_video:'📽 완성 영상 보기', no_video:'영상 준비 중',
    user_decision:'👤 최종 결정', ai_decision:'🤖 AI 자동 결정',
    video_done:'영상 완성 🎉',
    turns_user:'회 | 최종 결정: 사용자', turns_ai:'회 | 최종 결정: AI', total_turns:'총 대화 턴: ',
    confirm_label:'✓ 이 방향으로 확정',
    waiting_choice:'선택지를 골라주세요',
    survey_title:'설문 문항 (초안)',
    survey_sub:'심리적 소유감(MV)과 죄책감(DV)을 직·간접적으로 측정하는 7점 Likert 문항입니다.',
    po_section:'🧠 Part A. 심리적 소유감 (Psychological Ownership)',
    guilt_section:'😔 Part B. 죄책감 (Guilt)',
    scale_lo:'전혀 그렇지 않다', scale_hi:'매우 그렇다',

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let lang='ko', currentCondition='c1', isPlaying=false;
let playTimeout=null, procInterval=null;
// for interactive mode: resolve callback waiting for user choice
let pendingChoiceCb=null;

function i(k){return T[lang][k]||k;}

// ══════════════════════════════════════════════
//  LANG
// ══════════════════════════════════════════════
function setLang(l){
  lang=l;
  document.documentElement.lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
  document.body.style.fontFamily=l==='zh'?"'Noto Sans SC',sans-serif":"'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif";
  applyI18n(); resetChat();
}

function applyI18n(){
  const L=T[lang];
  document.getElementById('lb-conditions').textContent=L.conditions;
  // badges — only update IDs that exist
  const bmap={'b-aah-1':'aa_h','b-aah-2':'aa_h','b-aal-3':'aa_l','b-aal-4':'aa_l',
              'b-mph-1':'mp_h','b-mpl-2':'mp_l','b-mph-3':'mp_h','b-mpl-4':'mp_l'};
  Object.entries(bmap).forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.textContent=L[key];});
  ['c1','c2','c3','c4'].forEach(c=>{const el=document.getElementById('lb-'+c+'-desc');if(el)el.textContent=L[c+'_desc'];});
  document.getElementById('lb-note').innerHTML=L.note.replace(/\n/g,'<br>');
  document.getElementById('tab-chat').textContent=L.tab_chat;
  document.getElementById('tab-survey').textContent=L.tab_survey;
  document.getElementById('lb-agent-status').textContent=L.agent_status;
  const sh=document.getElementById('lb-start-hint'); if(sh) sh.textContent=L.start_hint;
  document.getElementById('play-btn').textContent=L.btn_start;
  document.getElementById('reset-btn').textContent=L.btn_reset;
  renderSurvey();
}

// ══════════════════════════════════════════════
//  CONDITIONS / TABS
// ══════════════════════════════════════════════
function selectCondition(c){
  if(isPlaying)return;
  currentCondition=c;
  document.querySelectorAll('.condition-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+c).classList.add('active');
  document.getElementById('condition-tag').textContent=c.toUpperCase();
  document.getElementById('footer-info').textContent=c.toUpperCase();
  resetChat();
}
function switchTab(tab){
  ['chat','survey'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  const isChat=tab==='chat';
  ['chat-header-wrap','chat-messages','chat-footer-wrap'].forEach(id=>document.getElementById(id).style.display=isChat?'':'none');
  document.getElementById('typing-wrap').style.display=isChat?'':'none';
  document.getElementById('survey-section').className='survey-section'+(isChat?'':' active');
}

// ══════════════════════════════════════════════
//  PROC STATUS
// ══════════════════════════════════════════════
function showProc(type){
  if(procInterval)clearInterval(procInterval);
  const msgs=PROC[lang][type]||PROC[lang].thinking;
  let pi=0;
  document.getElementById('proc-text').textContent=msgs[0];
  document.getElementById('proc-status').classList.add('visible');
  procInterval=setInterval(()=>{pi=(pi+1)%msgs.length;document.getElementById('proc-text').textContent=msgs[pi];},900);
}
function hideProc(){
  if(procInterval){clearInterval(procInterval);procInterval=null;}
  document.getElementById('proc-status').classList.remove('visible');
}

// ══════════════════════════════════════════════
//  CHAT HELPERS
// ══════════════════════════════════════════════
function setTyping(v){document.getElementById('typing').classList.toggle('visible',v);}
function scrollBottom(){const el=document.getElementById('chat-messages');el.scrollTop=el.scrollHeight;}

function appendEl(el){
  document.getElementById('chat-messages').appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  scrollBottom();
}

function makeBubble(role, html){
  const w=document.createElement('div');
  w.className='msg-row'+(role==='user'?' user':role==='system-row'?' system-row':' ai');
  if(role==='system-row'){w.innerHTML=`<div class="system-label">${html}</div>`;}
  else if(role==='user'){w.innerHTML=`<div class="bubble user">${html}</div>`;}
  else{w.innerHTML=`<div class="avatar-sm">✦</div><div class="bubble ai">${html}</div>`;}
  return w;
}

function makeCard(type, label, body){
  const w=document.createElement('div');
  w.className='msg-row'+(type==='user-decide'?' user':' ai');
  if(type==='user-decide'){
    w.innerHTML=`<div class="decision-card user-decide"><div class="card-label">${label}</div><div class="card-body">${body}</div></div>`;
  } else if(type==='ai-decide'){
    w.innerHTML=`<div class="avatar-sm">✦</div><div class="decision-card ai-decide"><div class="card-label">${label}</div><div class="card-body">${body}</div></div>`;
  } else { // result
    const url=VIDEO_URLS[body.cond];
    const hasLink=url&&url.trim()!=='';
    const mediaEl=hasLink
      ?`<video class="result-video" src="${url}" controls playsinline style="width:100%;border-radius:8px;margin-top:10px;max-height:220px;background:#000;"></video>`
      :`<span class="video-link-btn no-link">${i('no_video')}</span>`;
    w.innerHTML=`<div class="avatar-sm">✦</div><div class="result-card">
      <div class="rc-label">${i('video_done')}</div>
      <div class="rc-title">${body.body}</div>
      <div class="rc-body">${i('total_turns')}${body.turns}${i(body.turnsKey)}</div>
      ${mediaEl}</div>`;
  }
  return w;
}

// ══════════════════════════════════════════════
//  CHOICE WIDGET
//  Returns a promise that resolves with chosen text
// ══════════════════════════════════════════════
function showChoices(choices){
  return new Promise(resolve=>{
    const row=document.createElement('div');
    row.className='choice-row';
    const labels=['a)','b)','c)','d)'];
    choices.forEach((txt, cidx)=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.innerHTML=`<span class="choice-label">${labels[cidx]}</span> ${txt}`;
      btn.onclick=()=>{
        // mark selected, disable all
        row.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        row.classList.add('disabled');
        setTimeout(()=>resolve(txt), 300);
      };
      row.appendChild(btn);
    });
    document.getElementById('chat-messages').appendChild(row);
    requestAnimationFrame(()=>requestAnimationFrame(()=>row.classList.add('show')));
    scrollBottom();
  });
}

// Decide button (single confirm)
function showDecide(confirmText){
  return new Promise(resolve=>{
    const row=document.createElement('div');
    row.className='decide-row';
    const btn=document.createElement('button');
    btn.className='decide-btn';
    btn.textContent=i('confirm_label');
    btn.onclick=()=>{btn.disabled=true;setTimeout(()=>resolve(),300);};
    row.appendChild(btn);
    document.getElementById('chat-messages').appendChild(row);
    requestAnimationFrame(()=>requestAnimationFrame(()=>row.classList.add('show')));
    scrollBottom();
  });
}

// ══════════════════════════════════════════════
//  RESET
// ══════════════════════════════════════════════
function resetChat(){
  if(playTimeout)clearTimeout(playTimeout);
  hideProc(); isPlaying=false; setTyping(false);
  pendingChoiceCb=null;
  const pb=document.getElementById('play-btn');
  pb.disabled=false; pb.textContent=i('btn_start'); pb.onclick=startSimulation;
  document.getElementById('chat-messages').innerHTML=
    `<div class="msg-row system-row show"><div class="system-label">${i('start_hint')}</div></div>`;
}

// ══════════════════════════════════════════════
//  PLAYBACK  (async/await for interactive steps)
// ══════════════════════════════════════════════
function delay(ms){return new Promise(r=>{playTimeout=setTimeout(r,ms);});}

async function startSimulation(){
  if(isPlaying)return;
  isPlaying=true;
  const pb=document.getElementById('play-btn'); pb.disabled=true;
  document.getElementById('chat-messages').innerHTML='';

  const script=SCRIPTS[lang][currentCondition];

  for(const msg of script){
    if(!isPlaying) break;

    // ── system ──
    if(msg.role==='system'){
      appendEl(makeBubble('system-row', SYSTEM_MSG[lang]));
      await delay(500);
    }

    // ── ai / ai-decide ──
    else if(msg.role==='ai'||msg.role==='ai-decide'){
      setTyping(true); showProc(msg.proc||'thinking'); scrollBottom();
      await delay(1400);
      hideProc(); setTyping(false);
      if(msg.role==='ai'){
        appendEl(makeBubble('ai', msg.text.replace(/\n/g,'<br>')));
      } else {
        appendEl(makeCard('ai-decide', i('ai_decision'), msg.text));
      }
      await delay(900);
    }

    // ── auto-user (low AA) ──
    else if(msg.role==='auto-user'){
      appendEl(makeBubble('user', msg.text));
      await delay(850);
    }

    // ── choice (high AA — interactive) ──
    else if(msg.role==='choice'){
      // show choices, wait for user pick
      const chosen = await showChoices(msg.choices);
      // user bubble
      appendEl(makeBubble('user', chosen));
      await delay(400);
      // AI responds (always same)
      setTyping(true); showProc(msg.proc||'thinking'); scrollBottom();
      await delay(1400);
      hideProc(); setTyping(false);
      appendEl(makeBubble('ai', msg.next_ai.replace(/\n/g,'<br>')));
      await delay(900);
    }

    // ── decide (high AA — final confirm) ──
    else if(msg.role==='decide'){
      await showDecide();
      appendEl(makeCard('user-decide', i('user_decision'), msg.text));
      await delay(500);
    }

    // ── result ──
    else if(msg.role==='result'){
      setTyping(true); showProc('rendering'); scrollBottom();
      await delay(2200);
      hideProc(); setTyping(false);
      appendEl(makeCard('result', null, msg));
      await delay(400);
    }
  }

  isPlaying=false;
  pb.disabled=false; pb.textContent=i('btn_replay'); pb.onclick=()=>{resetChat();};
}

// ══════════════════════════════════════════════
//  SURVEY
// ══════════════════════════════════════════════
function renderSurvey(){
  const L=T[lang];
  const items=(qs,types,prefix,start)=>qs.map((q,j)=>{
    const n=start+j, tag=types[j];
    const opts=Array.from({length:7},(_,v)=>`<label class="likert-opt"><input type="radio" name="${prefix}${n}" value="${v+1}"><div class="likert-circle">${v+1}</div></label>`).join('');
    return `<div class="survey-item">
      <div class="survey-q"><span class="q-num">Q${n}.</span>${q}<span class="measure-tag ${tag}">${L[tag]}</span></div>
      <div class="likert-wrap">
        <span class="likert-end">${L.scale_lo}</span>
        <div class="likert-options">${opts}</div>
        <span class="likert-end r">${L.scale_hi}</span>
      </div></div>`;
  }).join('');
  document.getElementById('survey-section').innerHTML=`
    <div class="survey-header"><h2>${L.survey_title}</h2><p>${L.survey_sub}</p></div>
    <div class="survey-block"><div class="survey-block-title">${L.po_section}</div>${items(L.po_q,L.po_type,'po',1)}</div>
    <div class="survey-block"><div class="survey-block-title">${L.guilt_section}</div>${items(L.guilt_q,L.guilt_type,'g',6)}</div>
    <button class="survey-submit" id="survey-submit-btn">${L.submit}</button>`;
  const sb=document.getElementById('survey-submit-btn');
  if(sb) sb.onclick=()=>alert(L.submit_done);
}

// INIT
applyI18n();
