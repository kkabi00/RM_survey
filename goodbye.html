<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>실험 완료</title><link rel="stylesheet" href="shared/styles.css">
<style>
.goodbye-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.goodbye-card{background:var(--panel);border-radius:24px;padding:48px 36px;max-width:420px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.10)}
.goodbye-gif{width:180px;height:180px;object-fit:cover;border-radius:16px;margin-bottom:28px}
.goodbye-title{font-size:1.25rem;font-weight:800;color:var(--text);margin:0 0 14px}
.goodbye-line{font-size:0.97rem;color:var(--muted);margin:0 0 8px;line-height:1.6}
</style>
</head><body>
<div class="goodbye-shell">
  <div class="goodbye-card">
    <img src="goodbye.gif" class="goodbye-gif" alt="">
    <p class="goodbye-title">모든 참여가 완료되었습니다.</p>
    <p class="goodbye-line">다시 한번 참여해주셔서 감사드립니다.</p>
    <p class="goodbye-line">이제 이 페이지를 나가셔도 괜찮습니다.</p>
  </div>
</div>
</body></html>
