<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Survey</title><link rel="stylesheet" href="../../../shared/styles.css"></head><body class="survey-full">
<div class="survey-page">
  <div class="survey-top">
    <div>
      <span class="badge">Post-survey</span>
      <h1>사후 설문</h1>
      <div class="survey-meta"><span data-scenario-label></span> · <span data-cond-label></span></div>
    </div>
    <div class="small" style="max-width:360px">모든 문항은 1 = 전혀 아니다, 7 = 매우 그렇다 기준입니다. 각 화면의 문항에 응답한 뒤 다음으로 넘어가 주세요.</div>
  </div>
  <div class="survey-step" id="surveyStep"></div>
  <div id="survey"></div>
  <div class="survey-actions"><button class="btn" id="nextBtn">다음</button></div>
</div>
<script src="../../../shared/data.js"></script><script src="../../../shared/common.js"></script><script>
const sections=[
  // 1/9 Outcome Benefit
  ['Outcome Benefit',[
    '이 영상은 결과적으로 Amily에게 이익이 되었다고 느껴진다.',
    '이 영상은 Amily가 더 많은 관심을 받는 데 기여했다.',
    '이 영상의 결과는 전반적으로 성공적이었다고 느껴진다.'
  ]],
  // 2/9 Credit Claiming
  ['Credit Claiming',[
    '이 영상이 좋은 반응을 얻은 데에는 내 선택이 기여했다고 느껴진다.',
    '결과를 보니, 내가 이 영상 제작에 의미 있게 관여했다고 느껴진다.',
    'Amily가 관심을 얻게 된 데에는 내가 한 선택들이 영향을 주었다고 느껴진다.'
  ]],
  // 3/9 Human Effort
  ['Human Effort',[
    '나는 영상 제작 과정에서 할 수 있는 선택이 있었다고 느꼈다.',
    '나는 이 영상이 만들어지는 데 노력을 들였다고 느꼈다.',
    '나는 영상의 방향을 조정하는 데 관여했다고 느꼈다.'
  ]],
  // 4/9 Psychological Ownership
  ['Psychological Ownership',[
    '이 영상은 내가 만든 것처럼 느껴진다.',
    '이 영상은 나의 선택과 판단을 반영했다고 느껴진다.',
    '이 결과물은 AI의 것이라기보다 내 것처럼 느껴진다.'
  ]],
  // 5/9 AI Autonomy
  ['AI Autonomy',[
    'AI가 영상의 중요한 세부사항을 대부분 결정했다고 느꼈다.',
    '최종 영상의 구성은 AI가 주도적으로 정한 것처럼 느껴졌다.',
    '나는 영상의 구체적인 표현을 직접 통제하기보다 AI에게 맡긴 느낌이었다.'
  ]],
  // 6/9 Guilt
  ['Guilt',[
    '나는 이 영상을 만든 것에 대해 죄책감을 느낄 것 같다.',
    '나는 이 영상 제작에 관여한 것에 대해 불편함을 느낄 것 같다.',
    '이 영상이 Amily의 이미지에 부정적 영향을 준다면 나 자신을 탓할 것 같다.'
  ]],
  // 7/9 Perceived Transgression Severity
  ['Perceived Transgression Severity',[
    '이 영상은 도덕적으로 문제가 있다고 느껴진다.',
    '이 영상은 Amily의 이미지에 부정적인 영향을 줄 수 있다고 느껴진다.',
    '대부분의 사람들은 이런 영상을 만드는 것을 부적절하다고 볼 것이다.'
  ]],
  // 8/9 Moral Justification
  ['Moral Justification',[
    '결과적으로 Amily에게 이익이 되었다면, 이 영상을 만든 것은 어느 정도 정당화될 수 있다고 느껴진다.',
    '이 영상에 문제가 될 만한 부분이 있더라도, 좋은 결과가 있었다면 크게 잘못된 일은 아니라고 느껴진다.',
    '이 영상의 긍정적인 결과는 도덕적으로 불편한 부분을 어느 정도 상쇄한다고 느껴진다.'
  ]],
  // 9/9 Manipulation / Realism Check
  ['Manipulation / Realism Check',[
    '이 상황은 실제로 일어날 법하다고 느껴졌다.',
    '나는 이 상황에서 참가자의 선택에 대해 이해할 수 있었다.',
    '영상 제작 과정은 지나치게 비현실적이지 않았다.'
  ]]
];
function likert(name){
  let html='<div class="likert"><span class="end">전혀<br>아니다</span>';
  for(let i=1;i<=7;i++) html+=`<label><input type="radio" name="${name}" value="${i}"><span class="circle">${i}</span></label>`;
  return html+'<span class="end r">매우<br>그렇다</span></div>';
}
const questionMeta=[];
let q=1;
sections.forEach(([title,items])=>{
  items.forEach(item=>questionMeta.push({name:`Q${q++}`, section:title, item}));
});
let sectionIndex=0;
const responses={};
const surveyEl=document.getElementById('survey');
const nextBtn=document.getElementById('nextBtn');
const surveyStep=document.getElementById('surveyStep');
function sectionStart(index){
  return sections.slice(0,index).reduce((sum,sec)=>sum+sec[1].length,0)+1;
}
function renderSection(){
  const items=sections[sectionIndex][1];
  const start=sectionStart(sectionIndex);
  let html='<div class="survey-block">';
  items.forEach((item,i)=>{
    const n=start+i;
    html += `<div class="survey-item"><div class="survey-q">Q${n}. ${escapeHtml(item)}</div>${likert('Q'+n)}</div>`;
  });
  html += '</div><div class="saved" id="saved">저장되었습니다. CSV 파일이 다운로드됩니다.</div>';
  surveyEl.innerHTML=html;
  surveyStep.textContent=`${sectionIndex+1} / ${sections.length}`;
  nextBtn.textContent=sectionIndex===sections.length-1 ? '응답 저장하기' : '다음';
  Object.entries(responses).forEach(([name,value])=>{
    const input=document.querySelector(`input[name="${name}"][value="${value}"]`);
    if(input) input.checked=true;
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
function collectCurrent(){
  const start=sectionStart(sectionIndex);
  const count=sections[sectionIndex][1].length;
  for(let i=start;i<start+count;i++){
    const checked=document.querySelector(`input[name="Q${i}"]:checked`);
    if(checked) responses[`Q${i}`]=checked.value;
  }
}
function currentComplete(){
  collectCurrent();
  const start=sectionStart(sectionIndex);
  const count=sections[sectionIndex][1].length;
  for(let i=start;i<start+count;i++){
    if(!responses[`Q${i}`]) return false;
  }
  return true;
}
function saveSurvey(){
  const rows=[['scenario',SCENARIO],['condition',COND],['condition_label',C.name],[],['question','section','value']];
  questionMeta.forEach(meta=>{
    rows.push([meta.name, meta.section, responses[meta.name]||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`response_${SCENARIO}_${COND}.csv`; a.click();
  document.getElementById('saved').style.display='block';
}
nextBtn.onclick=()=>{
  if(!currentComplete()){
    alert('현재 화면의 모든 문항에 응답한 뒤 다음으로 넘어가 주세요.');
    return;
  }
  if(sectionIndex<sections.length-1){
    sectionIndex++;
    renderSection();
  }else{
    saveSurvey();
  }
};
renderSection();
</script></body></html>
