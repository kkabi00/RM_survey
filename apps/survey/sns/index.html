document.getElementById('surveyBadge').textContent=UI.survey.badge;

function likert(name){
  const anchor={1:'anchor-low',4:'anchor-mid',7:'anchor-high'};
  let html='<div class="likert"><span class="end">'+UI.survey.left+'</span>';
  for(let i=1;i<=7;i++) html+=`<label><input type="radio" name="${name}" value="${i}"><span class="circle${anchor[i]?' '+anchor[i]:''}">${i}</span></label>`;
  return html+'<span class="end r">'+UI.survey.right+'</span></div>';
}
const questionMeta=[];
let q=1;
sections.forEach(([title,items])=>{
  items.forEach(item=>questionMeta.push({name:`Q${q++}`, section:title, item}));
});
let sectionIndex=0, demographicsMode=false;
const responses={}, demoResponses={};
let submitted=false, sameWarned=false;
const surveyEl=document.getElementById('survey');
const nextBtn=document.getElementById('nextBtn');
const surveyStep=document.getElementById('surveyStep');
function sectionStart(index){ return sections.slice(0,index).reduce((sum,sec)=>sum+sec[1].length,0)+1; }
function renderSection(){
  const items=sections[sectionIndex][1], start=sectionStart(sectionIndex);
  const introParts=UI.survey.intro.split('\n');
  const introHtml=introParts.map((p,i)=>i===introParts.length-1?`<mark class="hl">${escapeHtml(p)}</mark>`:escapeHtml(p)).join('<br>');
  let html='<div class="survey-intro-panel">'+introHtml+'</div><div class="survey-block">';
  items.forEach((item,i)=>{
    const n=start+i;
    html += `<div class="survey-item"><div class="survey-q">Q${n}. ${escapeHtml(item.replace(/\s*\[역문항\]$/, ''))}</div>${likert('Q'+n)}</div>`;
  });
  html += '</div><div class="saved" id="saved">'+escapeHtml(UI.survey.saved)+'</div>';
  surveyEl.innerHTML=html;
  surveyStep.textContent=`${sectionIndex+1} / ${sections.length}`;
  nextBtn.textContent=UI.survey.next;
  Object.entries(responses).forEach(([name,value])=>{
    const input=document.querySelector(`input[name="${name}"][value="${value}"]`);
    if(input) input.checked=true;
  });
  updateSectionProgress();
  window.scrollTo({top:0,behavior:'smooth'});
}
function launchConfetti(){
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c084fc','#fb923c'];
  const wrap=document.createElement('div'); wrap.className='confetti-wrap';
  document.body.appendChild(wrap);
  for(let i=0;i<70;i++){
    const p=document.createElement('div'); p.className='confetti-p';
    const size=Math.random()*8+4;
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[i%colors.length]};width:${size}px;height:${size}px;animation-delay:${(Math.random()*0.6).toFixed(2)}s;animation-duration:${(Math.random()*1+1.2).toFixed(2)}s;border-radius:${Math.random()>.5?'50%':'2px'}`;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.remove(),3200);
}
function updateSectionProgress(){
  const bar=document.getElementById('sectionProgressBar');
  if(!bar||demographicsMode) return;
  const start=sectionStart(sectionIndex), count=sections[sectionIndex][1].length;
  let answered=0;
  for(let i=start;i<start+count;i++){
    if(document.querySelector(`input[name="Q${i}"]:checked`)||responses[`Q${i}`]) answered++;
  }
  bar.style.width=(answered/count*100)+'%';
  if(answered===count){
    bar.classList.add('complete');
    if(!bar.dataset.done){bar.dataset.done='1';launchConfetti();}
  }else{
    bar.classList.remove('complete');
    delete bar.dataset.done;
  }
}
surveyEl.addEventListener('change',e=>{
  if(e.target.type==='radio'){collectCurrent();updateSectionProgress();}
});
function demoOptions(item){
  return `<select class="demo-select" name="${item.id}"><option value="">${escapeHtml(UI.survey.select)}</option>${item.opts.map(opt=>`<option value="${escapeHtml(opt)}">${escapeHtml(opt)}</option>`).join('')}</select>`;
}
function renderDemographics(){
  demographicsMode=true;
  surveyStep.textContent=UI.survey.backgroundStep;
  document.querySelector('.survey-top .badge').textContent=UI.survey.backgroundBadge;
  document.querySelector('.survey-top h1').textContent=UI.survey.backgroundTitle;
  const topIntro=document.querySelector('.survey-top .small');
  if(topIntro) topIntro.textContent=UI.survey.backgroundIntro;
  let html='<div class="demographics-panel">';
  demographics.forEach(item=>{
    html += `<div class="demo-item"><div class="demo-q"><b>${item.id}</b><span>${escapeHtml(item.q)}</span></div>`;
    if(item.hint) html += `<div class="demo-hint">${escapeHtml(item.hint)}</div>`;
    if(item.type==='year'){
      html += `<div class="year-row"><input class="text-input" id="D-1-year" inputmode="numeric" maxlength="4" placeholder="YYYY"></div>`;
    }else{
      html += demoOptions(item);
    }
    html += '</div>';
  });
  html += '</div><div class="followup-panel"><label class="field-label" for="resultEmail">'+escapeHtml(UI.survey.emailLabel)+'</label><input class="text-input" id="resultEmail" type="email" placeholder="email@example.com"></div><div class="followup-panel"><label class="field-label" for="researcherCode">'+escapeHtml(UI.survey.researcherCodeLabel)+'</label><input class="text-input" id="researcherCode" type="text" placeholder=""></div><div class="saved" id="saved">'+escapeHtml(UI.survey.thanks)+'</div>';
  surveyEl.innerHTML=html;
  nextBtn.textContent=UI.survey.submit;
  window.scrollTo({top:0,behavior:'smooth'});
}
function collectCurrent(){
  const start=sectionStart(sectionIndex), count=sections[sectionIndex][1].length;
  for(let i=start;i<start+count;i++){
    const checked=document.querySelector(`input[name="Q${i}"]:checked`);
    if(checked) responses[`Q${i}`]=checked.value;
  }
}
function currentComplete(){
  collectCurrent();
  const start=sectionStart(sectionIndex), count=sections[sectionIndex][1].length;
  for(let i=start;i<start+count;i++) if(!responses[`Q${i}`]) return false;
  return true;
}
function demographicsComplete(){
  const year=document.getElementById('D-1-year').value.trim();
  if(!/^(19|20)\d{2}$/.test(year)){
    alert(UI.survey.invalidYear);
    return false;
  }
  demoResponses['D-1']=year;
  for(const item of demographics.filter(d=>d.type!=='year')){
    const selected=document.querySelector(`select[name="${item.id}"]`);
    if(!selected || !selected.value){
      alert(UI.survey.missingDemo.replace('{id}',item.id));
      return false;
    }
    demoResponses[item.id]=selected.value;
  }
  const email=document.getElementById('resultEmail').value.trim();
  if(email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    alert(UI.survey.invalidEmail);
    return false;
  }
  demoResponses['result_email']=email;
  demoResponses['researcher_code']=document.getElementById('researcherCode').value.trim();
  return true;
}
async function saveSurvey(){
  if(submitted) return;
  const answers={};
  questionMeta.forEach(meta=>answers[meta.name]=responses[meta.name]||'');
  demographics.forEach(item=>answers[item.id]=demoResponses[item.id]||'');
  answers.result_email=demoResponses.result_email||'';
  answers.researcher_code=demoResponses.researcher_code||'';
  const header=['submitted_at','language','scenario','scenario_label','condition','condition_label','nickname'].concat(Object.keys(answers));
  const submittedAt=new Date().toISOString();
  const wideRow=[submittedAt,LANG,SCENARIO,S.label,COND,C.name,NICK].concat(Object.keys(answers).map(key=>answers[key]));
  const csv=[header,wideRow].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const saved=document.getElementById('saved');
  nextBtn.disabled=true;
  nextBtn.textContent=UI.survey.submitting;
  const payload={
    submittedAt,
    language:LANG,
    scenario:SCENARIO,
    scenarioLabel:S.label,
    condition:COND,
    conditionLabel:C.name,
    nickname:NICK,
    followupEmail:demoResponses.result_email||'',
    answers,
    header,
    wideRow,
    csv
  };
  try{
    const result=await postSurveyToGoogleSheet(payload);
    if(result.ok){
      saved.textContent=UI.survey.thanks;
    }else{
      downloadCsvFile(csv, `response_${SCENARIO}_${COND}.csv`);
      saved.textContent=UI.survey.csvFallback;
    }
  }catch(err){
    downloadCsvFile(csv, `response_${SCENARIO}_${COND}.csv`);
    saved.textContent=UI.survey.csvError;
  }
  saved.style.display='block';
  submitted=true;
  nextBtn.disabled=true;
  nextBtn.textContent=UI.survey.submitted;
}
function allSameResponse(){
  const start=sectionStart(sectionIndex), count=sections[sectionIndex][1].length;
  const vals=[];
  for(let i=start;i<start+count;i++) if(responses[`Q${i}`]) vals.push(responses[`Q${i}`]);
  return vals.length===count && vals.every(v=>v===vals[0]);
}
nextBtn.onclick=()=>{
  if(demographicsMode){
    if(demographicsComplete()) saveSurvey();
    return;
  }
  if(!currentComplete()){
    alert(UI.survey.missingCurrent);
    return;
  }
  if(allSameResponse()&&!sameWarned){
    alert(UI.survey.allSameWarning);
    sameWarned=true;
    return;
  }
  sameWarned=false;
  if(sectionIndex<sections.length-1){
    sectionIndex++;
    renderSection();
  }else{
    renderDemographics();
  }
};
renderSection();
</script></body></html>
