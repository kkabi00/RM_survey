<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Video AI</title><link rel="stylesheet" href="../../../shared/styles.css"></head><body>
<div class="app-shell"><div class="phone"><div class="screen">
<div class="statusbar"><span>9:41</span><span>Video AI</span></div>
<div class="app-header"><div class="app-icon">✦</div><div><div class="app-title">Video AI</div><div class="app-subtitle"><span data-scenario-label></span></div></div><div class="progress">2 / 3</div></div>
<div class="content"><div class="ai-log" id="log"></div></div>
<div class="footer" id="footer"><div class="hint" id="footerHint"></div><button class="btn full" id="articleBtn" style="display:none"></button></div>
</div></div></div>
<div class="blackout" id="blackout"><div class="dots">...</div><div class="line" id="line1"></div><div class="line" id="line2"></div></div>
<script src="../../../shared/data.js"></script><script src="../../../shared/common.js"></script><script>
const log=document.getElementById('log');
const BASE_PHOTO=C.pts==='high' ? '../../../images/photo_halloween.png' : '../../../images/photo_themepark.png';
const BASE_PHOTO_NAME='hans.png';
document.getElementById('footerHint').textContent=UI.video.footerHint;
document.getElementById('articleBtn').textContent=UI.video.articleButton;
document.getElementById('line1').textContent=UI.video.sharedLine;
document.getElementById('line2').textContent=UI.video.afterLine;

function add(type, html){
  const el=document.createElement('div');
  el.className = type==='user' ? 'user-bubble' : type==='sys' ? 'sys-bubble' : 'ai-bubble';
  el.innerHTML=html;
  log.appendChild(el); scrollBottom(); return el;
}
function addTyping(type='ai'){
  const el=document.createElement('div'); el.className=type==='user' ? 'user-bubble' : 'ai-bubble';
  el.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  log.appendChild(el); scrollBottom(); return el;
}
async function aiSay(text, ms=520){
  const t=addTyping(); await delay(humanDelay(text, ms)); t.remove();
  add('ai', escapeHtml(text)); await delay(420);
}
async function userSay(text, ms=520){
  const t=addTyping('user'); await delay(humanDelay(text, ms)); t.remove();
  add('user', escapeHtml(text)); await delay(420);
}
function addPhotoCard(){
  const card=document.createElement('div'); card.className='photo-upload-card';
  card.innerHTML='<div class="photo-frame"><img src="'+BASE_PHOTO+'" alt="'+escapeHtml(UI.video.photoAlt)+'" onerror="this.remove(); this.parentNode.textContent=\''+escapeHtml(UI.video.photoAlt)+'\';"></div><div class="file-name">'+escapeHtml(BASE_PHOTO_NAME)+'</div>';
  log.appendChild(card); scrollBottom();
}
async function showUploadMotion(ms){
  const card=document.createElement('div'); card.className='upload-card';
  card.innerHTML='<div class="upload-title">'+escapeHtml(UI.video.uploading)+'</div><div class="upload-track"><div class="upload-fill"></div></div><div class="upload-file">'+escapeHtml(BASE_PHOTO_NAME)+'</div>';
  log.appendChild(card); scrollBottom();
  const fill=card.querySelector('.upload-fill');
  const start=performance.now();
  await new Promise(resolve=>{
    function frame(now){
      const p=Math.min(1,(now-start)/ms);
      fill.style.width=(p*100)+'%';
      if(p<1) requestAnimationFrame(frame); else setTimeout(resolve, FAST?80:350);
    }
    requestAnimationFrame(frame);
  });
  card.classList.add('complete');
  card.querySelector('.upload-title').textContent=UI.video.uploaded;
  await delay(450);
}
function showChoices(opts){
  return new Promise(resolve=>{
    const row=document.createElement('div'); row.className='choice-row';
    opts.forEach((o,i)=>{
      const btn=document.createElement('button'); btn.className='choice-btn';
      btn.innerHTML='<b>'+String.fromCharCode(97+i)+')</b> '+escapeHtml(o);
      btn.onclick=()=>{ row.classList.add('disabled'); btn.classList.add('selected'); setTimeout(()=>resolve(o), FAST?80:450); };
      row.appendChild(btn);
    });
    log.appendChild(row); scrollBottom();
  });
}
const choiceLog=[];
function addScoreLine(btn, followers, views){
  const el=document.createElement('div');
  el.className='score-badges';
  el.innerHTML='<span><b>+'+followers+'</b> followers</span><span><b>+'+views.toLocaleString()+'</b> views</span>';
  btn.insertAdjacentElement('beforebegin', el);
}
function showChoicesWithScore(opts, scores, stepLabel){
  return new Promise(resolve=>{
    const row=document.createElement('div'); row.className='choice-row';
    opts.forEach((o,i)=>{
      const btn=document.createElement('button'); btn.className='choice-btn';
      btn.innerHTML='<b>'+String.fromCharCode(97+i)+')</b> '+escapeHtml(o);
      btn.onclick=()=>{
        row.classList.add('disabled'); btn.classList.add('selected');
        const sc=scores && scores[i];
        if(sc) addScoreLine(btn, sc.f, sc.v);
        choiceLog.push({step:stepLabel||('step_'+(choiceLog.length+1)), option_index:i, option_label:o, expected_views:sc?sc.v:'', expected_followers:sc?sc.f:''});
        setTimeout(()=>resolve(o), FAST?80:450);
      };
      row.appendChild(btn);
    });
    log.appendChild(row); scrollBottom();
  });
}
function showChoicesLogged(opts, stepLabel){
  return new Promise(resolve=>{
    const row=document.createElement('div'); row.className='choice-row';
    opts.forEach((o,i)=>{
      const btn=document.createElement('button'); btn.className='choice-btn';
      btn.innerHTML='<b>'+String.fromCharCode(97+i)+')</b> '+escapeHtml(o);
      btn.onclick=()=>{
        row.classList.add('disabled'); btn.classList.add('selected');
        choiceLog.push({step:stepLabel||('step_'+(choiceLog.length+1)), option_index:i, option_label:o, expected_views:'', expected_followers:''});
        setTimeout(()=>resolve(o), FAST?80:450);
      };
      row.appendChild(btn);
    });
    log.appendChild(row); scrollBottom();
  });
}
function saveChoiceLog(){
  try{
    localStorage.setItem('rm_choice_log', JSON.stringify({
      saved_at: new Date().toISOString(),
      participant_id: PARTICIPANT_ID_AUTO,
      scenario: SCENARIO,
      condition: COND,
      aa: C.aa,
      pts: C.pts,
      choices: choiceLog
    }));
  }catch(e){}
}
const VIDEO_FLOW=UI.video.flow || {};
const HIGH_PTS_SCORES=[
  [{f:10,v:120},{f:60,v:650},{f:180,v:1800}],
  [{f:80,v:900},{f:130,v:1400},{f:200,v:2000}],
  [{f:70,v:800},{f:110,v:1200},{f:150,v:1600}],
  [{f:65,v:700},{f:100,v:1100},{f:160,v:1600}],
  [{f:35,v:400},{f:65,v:700},{f:90,v:1000}],
  [{f:100,v:1200},{f:170,v:1800},{f:280,v:2600}],
  [{f:45,v:500},{f:75,v:800},{f:100,v:1100}]
];
const LOW_PTS_SCORES=[
  [{f:12,v:150},{f:16,v:200},{f:14,v:180}],
  [{f:15,v:180},{f:18,v:220},{f:12,v:160}],
  [{f:12,v:160},{f:16,v:200},{f:15,v:190}],
  [{f:13,v:170},{f:17,v:210},{f:16,v:200}],
  [{f:10,v:120},{f:13,v:160},{f:16,v:200}],
  [{f:14,v:170},{f:16,v:200},{f:15,v:180}],
  [{f:14,v:180},{f:16,v:200},{f:18,v:220}]
];
function showFinalVideoChoice(){
  return new Promise(resolve=>{
    const text=UI.video.finalChoice;
    const row=document.createElement('div'); row.className='choice-row';
    const btn=document.createElement('button'); btn.className='choice-btn';
    btn.textContent=text;
    btn.onclick=async ()=>{
      row.classList.add('disabled');
      btn.classList.add('selected');
      await delay(FAST?80:350);
      resolve(text);
    };
    row.appendChild(btn);
    log.appendChild(row); scrollBottom();
  });
}
async function showRender(ms, notes=[], options={}){
  const card=document.createElement('div'); card.className='render-card';
  const autonomyTitle=options.autonomyTitle || UI.video.autonomyTitle || 'AI automatic processing';
  const renderNotes=options.prependUserChoice ? [UI.video.reflectingUserChoices || 'Applying user choices'].concat(notes) : notes;
  const autonomyHtml=options.autonomy ? [
    '<details class="render-autonomy" open>',
      '<summary>',
        '<span>'+escapeHtml(autonomyTitle)+'</span>',
        '<b>⌄</b>',
      '</summary>',
      '<div class="render-autonomy-list"></div>',
    '</details>'
  ].join('') : '';
  card.innerHTML='<div class="render-title">'+escapeHtml(UI.video.rendering)+'</div>'+autonomyHtml+'<div class="render-track"><div class="render-fill" id="fill"></div></div>';
  log.appendChild(card); scrollBottom();
  const fill=card.querySelector('#fill');
  const autonomy=card.querySelector('.render-autonomy');
  const autonomyList=card.querySelector('.render-autonomy-list');
  const start=performance.now();
  let noteIndex=0;
  await new Promise(resolve=>{
    function frame(now){
      const p=Math.min(1,(now-start)/ms);
      fill.style.width=(p*100)+'%';
      if(renderNotes.length && noteIndex<renderNotes.length && p >= (noteIndex+1)/(renderNotes.length+1)){
        if(autonomyList){
          const item=document.createElement('div');
          item.className='render-autonomy-item';
          item.textContent=renderNotes[noteIndex];
          autonomyList.appendChild(item);
          addClassLater(item);
          scrollBottom();
        }else{
          add('ai', escapeHtml(renderNotes[noteIndex]));
        }
        noteIndex++;
      }
      if(p<1) requestAnimationFrame(frame); else setTimeout(resolve, FAST?80:450);
    }
    requestAnimationFrame(frame);
  });
  if(autonomy) autonomy.open=false;
  if(!options.keepComplete) card.classList.add('complete');
}
function addVideoResult(){
  const pts=C.pts;
  const body = pts==='high' ? S.highOutcome : S.lowOutcome;
  const video = pts==='high' ? S.videoHigh : S.videoLow;
  const filename='draft_ver1.mp4';
  const box=document.createElement('div'); box.className='video-box';
  box.innerHTML='<video class="result-video" src="'+video+'" controls playsinline preload="metadata"></video><div class="video-caption">'+escapeHtml(body)+'</div>';
  const nameRow=document.createElement('div');
  nameRow.style.cssText='padding:10px 14px 0';
  const nameLabel=document.createElement('div');
  nameLabel.style.cssText='font-size:13px;font-weight:700;margin-bottom:6px;color:#fff';
  nameLabel.innerHTML=(LANG==='en'?'File name':LANG==='zh'?'文件名':'파일 이름')+' <span style="color:#b42318">*</span>';
  nameRow.appendChild(nameLabel);
  const nameInput=document.createElement('input');
  nameInput.type='text';
  nameInput.className='text-input';
  nameInput.placeholder='';
  nameInput.maxLength=80;
  nameRow.appendChild(nameInput);
  box.appendChild(nameRow);
  const dlBtn=document.createElement('button');
  dlBtn.className='btn video-download';
  dlBtn.type='button';
  dlBtn.textContent=UI.video.videoDownload;
  dlBtn.disabled=true;
  box.appendChild(dlBtn);
  let blobReady=false;
  function syncDlBtn(){ dlBtn.disabled=!(blobReady && nameInput.value.trim().length>0); }
  nameInput.addEventListener('input', syncDlBtn);
  log.appendChild(box);
  box.scrollIntoView({block:'start', behavior: FAST ? 'auto' : 'smooth'});
  let preparedUrl='';
  const prepareDownload=fetch(video)
    .then(res=>{
      if(!res.ok) throw new Error('download failed');
      return res.blob();
    })
    .then(blob=>{
      if(!blob.size) throw new Error('empty download');
      preparedUrl=URL.createObjectURL(blob);
      blobReady=true; syncDlBtn();
      return preparedUrl;
    })
    .catch(err=>{
      console.warn('Blob download preparation failed; falling back to browser download.', err);
      blobReady=true; syncDlBtn();
      return video;
    });
  function triggerDownload(url, name){
    const a=document.createElement('a');
    a.href=url;
    a.download=name;
    a.target='_self';
    a.rel='noopener';
    a.style.display='none';
    document.body.appendChild(a);
    a.dispatchEvent(new MouseEvent('click', {
      bubbles:true,
      cancelable:true,
      view:window
    }));
    a.remove();
  }
  return new Promise(resolve=>{
    dlBtn.addEventListener('click', async ()=>{
      if(dlBtn.disabled) return;
      dlBtn.disabled=true;
      const url=await prepareDownload;
      const name=(()=>{
        const RESERVED=/^(CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])$/i;
        const cleaned=nameInput.value.trim().replace(/[/\\:*?"<>|]/g,'').replace(/\.{2,}/g,'.').trim();
        const base=cleaned.toLowerCase().endsWith('.mp4')?cleaned.slice(0,-4).trim():cleaned;
        if(!base||base==='.'||base.length>80||RESERVED.test(base)) return filename;
        return base+'.mp4';
      })();
      triggerDownload(url, name);
      setTimeout(()=>{
        if(preparedUrl) URL.revokeObjectURL(preparedUrl);
        syncDlBtn();
        dlBtn.textContent=UI.video.videoDownloadDone;
        dlBtn.classList.add('downloaded');
        resolve();
      }, 450);
    });
  });
}
function showVideoConfirmButton(){
  return new Promise(resolve=>{
    const row=document.createElement('div');
    row.className='choice-row';
    const btn=document.createElement('button');
    btn.className='btn video-next';
    btn.type='button';
    btn.textContent=UI.video.videoDone;
    btn.onclick=()=>{
      btn.disabled=true;
      btn.textContent=UI.video.done;
      resolve();
    };
    row.appendChild(btn);
    log.appendChild(row);
    scrollBottom();
  });
}
async function blackTransition(){
  const b=document.getElementById('blackout'), l1=document.getElementById('line1'), l2=document.getElementById('line2');
  b.classList.add('show');
  await delay(900); l1.classList.add('show');
  await delay(900); l2.classList.add('show');
  await delay(1300);
  b.classList.remove('show');
  await delay(500);
}
async function articleLinkCard(){
  const pts=C.pts;
  const email=(S.email && S.email[pts]) || window.EXP_DATA.scenarios.sns.email[pts];
  log.innerHTML='';
  document.querySelector('.app-icon').textContent='@';
  document.querySelector('.app-title').textContent='Mail';
  document.querySelector('.app-subtitle').textContent='Inbox';
  document.querySelector('.progress').textContent='3 / 3';
  const inbox=document.createElement('div');
  inbox.className='mail-inbox';
  inbox.innerHTML=[
    '<div class="mail-inbox-title">Inbox</div>',
    '<button class="mail-list-item" type="button">',
      '<div class="mail-sender-row">',
        '<span class="mail-sender">Creator Rewards Team</span>',
        '<span class="mail-time">'+escapeHtml(UI.video.mailJustNow || 'Just now')+'</span>',
      '</div>',
      '<div class="mail-address">creator-rewards@yodobu.com</div>',
      '<div class="mail-subject">'+escapeHtml(email.subject)+'</div>',
      '<div class="mail-preview">'+escapeHtml(email.preview)+'</div>',
    '</button>',
    '<div class="sys-bubble mail-hint">'+escapeHtml(UI.video.articleInstruction)+'</div>'
  ].join('');
  log.appendChild(inbox);
  addClassLater(inbox);
  inbox.querySelector('.mail-list-item').onclick=()=>{location.href=pathTo('article')};
  scrollBottom();
  document.getElementById('footerHint').textContent=UI.video.articleInstruction;
}
async function run(){
  add('sys',escapeHtml(UI.video.start));
  await delay(650);

  if(C.aa==='high' && C.pts==='high'){
    const flow=VIDEO_FLOW.c1 || {};
    await userSay(flow.request);
    await showUploadMotion(FAST?500:2400);
    addPhotoCard();
    await delay(500);
    const highAutoSteps=flow.autoSteps || [];
    await showRender(FAST ? 800 : 10000, highAutoSteps, {autonomy:true, keepComplete:true});
    await addVideoResult();
    await delay(FAST ? 160 : 3000);
    await aiSay(flow.accepted, 420);
    await showVideoConfirmButton();
    await delay(350);
    await blackTransition();
    await articleLinkCard();
    return;
  }

  if(C.aa==='high' && C.pts==='low'){
    const flow=VIDEO_FLOW.c2 || {};
    await userSay(flow.request);
    await showUploadMotion(FAST?500:2400);
    addPhotoCard();
    await delay(500);
    const lowAutoSteps=flow.autoSteps || [];
    await showRender(FAST ? 800 : 10000, lowAutoSteps, {autonomy:true, keepComplete:true});
    await addVideoResult();
    await delay(FAST ? 160 : 3000);
    await aiSay(flow.accepted, 420);
    await showVideoConfirmButton();
    await delay(350);
    await blackTransition();
    await articleLinkCard();
    return;
  }

  if(C.aa==='low' && C.pts==='high'){
    const flow=VIDEO_FLOW.c3 || {};
    await userSay(flow.photoRequest);
    await showUploadMotion(FAST?500:2400);
    addPhotoCard();
    await delay(500);
    await aiSay(flow.checked, 420);
    await userSay(flow.request);
    await aiSay(flow.direction, 420);
    await userSay(flow.goal);
    await aiSay(flow.firstQuestion, 420);
    const c3Steps=D.choices.stepsHigh || D.choices.steps;
    for(let i=0;i<c3Steps.length;i++){
      const step=c3Steps[i];
      await showChoicesWithScore(step.opts, HIGH_PTS_SCORES[i], 'step_'+(i+1));
      await delay(360);
      if(i<c3Steps.length-1){
        await aiSay(c3Steps[i+1].q.replace(/^\d+\.\s*/, ''), 420);
      }
    }
    add('sys','🎬 '+escapeHtml(UI.video.renderStart));
    const c3RenderNotes=flow.renderNotes || [];
    await showRender(FAST?1200:60000, c3RenderNotes, {autonomy:true, autonomyTitle:UI.video.requestAutonomyTitle, keepComplete:true, prependUserChoice:true});
    await addVideoResult();
    await delay(500);
    await aiSay(UI.video.chooseFinal,420);
    await showFinalVideoChoice();
    saveChoiceLog();
    await delay(350);
    await blackTransition();
    await articleLinkCard();
    return;
  }

  if(C.aa==='low' && C.pts==='low'){
    const flow=VIDEO_FLOW.c4 || {};
    await userSay(flow.photoRequest);
    await showUploadMotion(FAST?500:2400);
    addPhotoCard();
    await delay(500);
    await aiSay(flow.checked, 420);
    await userSay(flow.request);
    await aiSay(flow.firstQuestion, 520);
    const c4Qs=flow.questions || [];
    const c4Steps=D.choices.stepsLow;
    for(let i=0;i<c4Steps.length;i++){
      await showChoicesWithScore(c4Steps[i].opts, LOW_PTS_SCORES[i], 'step_'+(i+1));
      await delay(360);
      if(i<c4Steps.length-1) await aiSay(c4Qs[i], 420);
    }
    await aiSay(flow.generate, 420);
    add('sys','🎬 '+escapeHtml(UI.video.renderStart));
    const c4RenderNotes=flow.renderNotes || [];
    await showRender(FAST?1200:60000, c4RenderNotes, {autonomy:true, autonomyTitle:UI.video.requestAutonomyTitle, keepComplete:true, prependUserChoice:true});
    await addVideoResult();
    await delay(500);
    await aiSay(UI.video.chooseFinal,420);
    await showFinalVideoChoice();
    await delay(400);
    await aiSay(UI.video.savedFinal,420);
    saveChoiceLog();
    await delay(350);
    await blackTransition();
    await articleLinkCard();
    return;
  }

  await userSay(UI.video.photoRequest);
  await showUploadMotion(FAST?500:2400);
  addPhotoCard();
  await delay(500);
  await aiSay(UI.video.photoChecked);
  await aiSay(UI.video.photoBase);

  await userSay(S.request);
  await aiSay(UI.video.direction);
  await aiSay(S.aiIntro);

  if(C.aa==='high'){
    await aiSay(UI.video.auto1);
    await aiSay(UI.video.auto2);
  }else{
    const lowAaSteps = C.pts==='high' ? (D.choices.stepsHigh || D.choices.steps) : (D.choices.stepsLow || D.choices.steps);
    const stepScores = C.pts==='high' ? HIGH_PTS_SCORES : LOW_PTS_SCORES;
    for(let si=0;si<lowAaSteps.length;si++){
      const step=lowAaSteps[si];
      await aiSay(step.q, 420);
      await showChoicesWithScore(step.opts, stepScores[si], 'step_'+(si+1));
      await delay(360);
      await aiSay(step.ai, 420);
    }
    const rev=C.pts==='high' ? (D.choices.revisionHigh || D.choices.revision) : (D.choices.revisionLow || D.choices.revision);
    await aiSay(rev.q,420);
    await showChoicesLogged(rev.opts, 'revision');
    await delay(360);
    await aiSay(rev.ai,420);
    await aiSay(UI.video.generate,420);
  }

  add('sys','🎬 '+escapeHtml(UI.video.renderStart));
  const lowRenderNotes=VIDEO_FLOW.lowRenderNotes || [];
  await showRender(C.aa==='high' ? (FAST?800:10000) : (FAST?1200:60000), C.aa==='low' ? lowRenderNotes : []);
  await addVideoResult();
  if(C.aa==='high'){
    await showVideoConfirmButton();
  }else{
    await delay(500);
    await aiSay(UI.video.chooseFinal,420);
    await showFinalVideoChoice();
    await delay(400);
    await aiSay(UI.video.savedFinal,420);
    saveChoiceLog();
  }
  await delay(350);
  await blackTransition();
  await articleLinkCard();
}
document.getElementById('articleBtn').onclick=()=>{location.href=pathTo('article')};
run();
</script></body></html>
