<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Simulation — Research Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8; --sidebar-bg:#faf7f2; --header-bg:#faf7f2; --border:#e8e0d0;
  --accent:#d4570a; --accent-light:#fde8d8; --accent-hover:#b84708;
  --user-bubble:#d4570a; --user-text:#fff;
  --ai-bubble:#ede8df; --ai-text:#1a1208; --system-text:#8c7e6a;
  --decision-bg:#fff8ec; --decision-border:#e8a43a;
  --final-bg:#e6f4ea; --final-border:#34a853;
  --reverse-bg:#fff0f0; --reverse-border:#e88;
  --font-ko:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-en:'Noto Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-zh:'Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --font: var(--font-ko);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);height:100vh;display:flex;overflow:hidden;color:var(--ai-text);}

/* ── SIDEBAR ── */
.sidebar{width:272px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-top{padding:18px 16px 12px;border-bottom:1px solid var(--border);}
.lang-switcher{display:flex;gap:4px;margin-bottom:14px;}
.lang-btn{flex:1;padding:6px 0;font-size:12px;font-weight:600;font-family:var(--font);border:1.5px solid var(--border);border-radius:8px;background:transparent;color:var(--system-text);cursor:pointer;transition:all .15s;}
.lang-btn:hover{border-color:var(--accent);color:var(--accent);}
.lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--system-text);margin-bottom:8px;}
.cond-list{padding:10px 10px 0;}
.condition-btn{display:flex;flex-direction:column;gap:4px;width:100%;padding:11px 13px;margin-bottom:3px;border:1.5px solid transparent;border-radius:10px;background:transparent;cursor:pointer;text-align:left;transition:all .15s;font-family:var(--font);}
.condition-btn:hover{background:var(--accent-light);}
.condition-btn.active{background:var(--accent-light);border-color:var(--accent);}
.condition-btn .c-label{font-size:12.5px;font-weight:700;color:#1a1208;}
.condition-btn.active .c-label{color:var(--accent);}
.condition-btn .c-desc{font-size:11px;color:var(--system-text);line-height:1.4;}
.badge-row{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.badge.aa-h{background:#fde8d8;color:#b84708;}
.badge.aa-l{background:#ede0f5;color:#7b2fbe;}
.badge.mp-h{background:#fef3c7;color:#92400e;}
.badge.mp-l{background:#dcfce7;color:#15803d;}
.sidebar-divider{height:1px;background:var(--border);margin:12px 16px;}
.sidebar-note{font-size:11px;color:var(--system-text);padding:0 16px 16px;line-height:1.8;}
.sidebar-note strong{color:#1a1208;font-weight:600;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.tab-row{display:flex;background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 20px;flex-shrink:0;}
.tab-btn{padding:13px 16px;font-size:13px;font-weight:500;font-family:var(--font);background:transparent;border:none;border-bottom:2.5px solid transparent;cursor:pointer;color:var(--system-text);transition:color .15s;white-space:nowrap;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.chat-header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:13px 20px;display:flex;align-items:center;gap:11px;flex-shrink:0;}
.agent-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#d4570a,#e8852a);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.h-name{font-size:15px;font-weight:600;color:#1a1208;}
.h-status{font-size:12px;color:var(--system-text);}
.condition-tag{font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-light);padding:2px 9px;border-radius:20px;margin-left:8px;}
.aa-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:4px;}
.aa-tag.high{background:#fde8d8;color:#b84708;}
.aa-tag.low{background:#ede0f5;color:#7b2fbe;}

/* ── MESSAGES ── */
.chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;}
.msg-row{display:flex;align-items:flex-end;gap:8px;opacity:0;transform:translateY(10px);transition:opacity .3s ease,transform .3s ease;}
.msg-row.show{opacity:1;transform:translateY(0);}
.msg-row.user{flex-direction:row-reverse;}
.msg-row.system-row{justify-content:center;margin:4px 0;}
.avatar-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#d4570a,#e8852a);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-bottom:2px;}
.bubble{max-width:68%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;word-break:keep-all;}
.bubble.user{background:var(--user-bubble);color:var(--user-text);border-bottom-right-radius:4px;}
.bubble.ai{background:var(--ai-bubble);color:var(--ai-text);border-bottom-left-radius:4px;}
.system-label{font-size:11px;color:var(--system-text);padding:3px 12px;background:var(--border);border-radius:20px;}

/* ── CHOICES ── */
.choice-row{display:flex;flex-direction:column;gap:7px;align-items:flex-end;padding:4px 0 8px 40px;opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease;}
.choice-row.show{opacity:1;transform:translateY(0);}
.choice-row.disabled .choice-btn{pointer-events:none;opacity:0.45;}
.choice-btn{display:inline-block;padding:9px 16px;background:#fff;border:1.5px solid var(--border);border-radius:18px;font-size:13px;font-weight:500;font-family:var(--font);color:var(--ai-text);cursor:pointer;text-align:left;transition:border-color .15s,background .15s,transform .1s;max-width:76%;word-break:keep-all;line-height:1.5;}
.choice-btn:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.choice-btn:active{transform:scale(.97);}
.choice-label{font-weight:700;color:var(--accent);margin-right:4px;flex-shrink:0;}
.choice-btn.selected{border-color:var(--accent);background:var(--accent);color:#fff;pointer-events:none;}
.choice-btn.selected .choice-label{color:#fff;}

/* ── DECIDE ── */
.decide-row{display:flex;justify-content:flex-end;padding:4px 0 8px 40px;opacity:0;transform:translateY(8px);transition:opacity .3s ease,transform .3s ease;}
.decide-row.show{opacity:1;transform:translateY(0);}
.decide-btn{padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s,transform .1s;}
.decide-btn:hover{background:var(--accent-hover);}
.decide-btn:active{transform:scale(.97);}
.decide-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── CARDS ── */
.decision-card{max-width:70%;padding:13px 15px;border-radius:14px;font-size:13.5px;line-height:1.6;margin:4px 0;}
.decision-card.user-decide{background:var(--decision-bg);border:1.5px solid var(--decision-border);border-bottom-right-radius:4px;}
.card-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;opacity:.65;}
.card-body{font-size:13px;line-height:1.55;}
.result-card{max-width:74%;padding:14px 16px;border-radius:14px;background:var(--final-bg);border:1.5px solid var(--final-border);font-size:13.5px;line-height:1.6;margin:4px 0;border-bottom-left-radius:4px;}
.rc-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#1a6130;margin-bottom:5px;}
.rc-title{font-weight:700;font-size:15px;color:#1a6130;}
.rc-body{color:#1a4a28;margin-top:4px;font-size:12.5px;}

/* ── LOADING INDICATOR (HIGH AA = long, LOW AA = instant) ── */
.loading-bar-wrap{background:var(--ai-bubble);border-radius:14px;padding:12px 16px;max-width:68%;margin:4px 0;display:none;}
.loading-bar-wrap.visible{display:block;}
.loading-bar-label{font-size:11.5px;color:var(--system-text);margin-bottom:8px;}
.loading-bar-track{height:6px;background:#ddd6cc;border-radius:3px;overflow:hidden;}
.loading-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#e8852a);border-radius:3px;width:0%;transition:none;}
.loading-steps{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.loading-step{font-size:10px;color:var(--system-text);padding:2px 8px;background:#fff;border:1px solid var(--border);border-radius:10px;opacity:.5;transition:opacity .3s;}
.loading-step.done{opacity:1;color:var(--accent);border-color:var(--accent);}

/* ── TYPING ── */
.typing-wrap{padding:5px 24px 3px;min-height:52px;display:flex;flex-direction:column;justify-content:center;gap:3px;flex-shrink:0;}
.typing-row{display:flex;align-items:center;gap:8px;}
.typing-dots{background:var(--ai-bubble);border-radius:18px;padding:9px 14px;display:none;gap:4px;align-items:center;}
.typing-dots.visible{display:flex;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:#aaa;animation:tdot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.proc-status{display:flex;align-items:center;gap:5px;padding-left:36px;font-size:11px;color:var(--system-text);height:14px;opacity:0;transition:opacity .3s;}
.proc-status.visible{opacity:1;}
.proc-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pdot 1.4s ease-in-out infinite;}
@keyframes pdot{0%,100%{opacity:.25}50%{opacity:1}}

/* ── FOOTER ── */
.chat-footer{border-top:1px solid var(--border);background:var(--header-bg);padding:13px 20px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.play-btn{padding:9px 20px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:background .15s,transform .1s;}
.play-btn:hover{background:var(--accent-hover);}
.play-btn:active{transform:scale(.97);}
.play-btn:disabled{opacity:.4;cursor:not-allowed;}
.reset-btn{padding:9px 15px;background:transparent;color:var(--system-text);border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;font-family:var(--font);cursor:pointer;transition:background .15s;}
.reset-btn:hover{background:var(--accent-light);}
.footer-info{margin-left:auto;font-size:11.5px;color:var(--system-text);}

/* ── SURVEY ── */
.survey-section{display:none;flex:1;overflow-y:auto;padding:28px 36px 40px;background:var(--bg);}
.survey-section.active{display:block;}
.survey-header{margin-bottom:24px;}
.survey-header h2{font-size:19px;font-weight:700;color:#1a1208;margin-bottom:5px;}
.survey-header p{font-size:12.5px;color:var(--system-text);line-height:1.6;}
.survey-block{background:var(--sidebar-bg);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;}
.survey-block-title{font-size:11px;font-weight:700;color:var(--system-text);text-transform:uppercase;letter-spacing:.08em;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.survey-item{margin-bottom:24px;}
.survey-item:last-child{margin-bottom:0;}
.survey-q{font-size:13.5px;font-weight:500;color:#1a1208;margin-bottom:10px;line-height:1.6;}
.q-num{font-weight:700;color:var(--accent);margin-right:3px;}
.item-code{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-left:5px;vertical-align:middle;background:#f0ebe2;color:#8c7e6a;}
.item-reverse{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:3px;vertical-align:middle;background:var(--reverse-bg);color:#c0392b;border:1px solid var(--reverse-border);}
.likert-wrap{display:flex;align-items:center;gap:8px;}
.likert-end{font-size:11px;color:var(--system-text);min-width:70px;line-height:1.3;}
.likert-end.r{text-align:right;}
.likert-options{display:flex;gap:5px;flex:1;justify-content:center;}
.likert-opt{display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:3px;}
.likert-opt input{display:none;}
.likert-circle{width:33px;height:33px;border-radius:50%;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;color:var(--system-text);transition:all .15s;cursor:pointer;}
.likert-opt:hover .likert-circle{border-color:var(--accent);color:var(--accent);}
.likert-opt input:checked + .likert-circle{background:var(--accent);border-color:var(--accent);color:#fff;}
.survey-submit{display:block;width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:6px;transition:background .15s;}
.survey-submit:hover{background:var(--accent-hover);}
.scenario-box{background:#fffdf7;border:1.5px solid var(--decision-border);border-radius:12px;padding:16px 18px;margin-bottom:20px;font-size:13px;line-height:1.75;color:#3a2a0a;}
.scenario-box-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#b84708;margin-bottom:8px;}
.note-box{background:#f0f7ff;border:1px solid #b3d4f5;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11.5px;color:#1a3a5c;line-height:1.65;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-top">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="ko">한국어</button>
      <button class="lang-btn" data-lang="en">English</button>
      <button class="lang-btn" data-lang="zh">中文</button>
    </div>
    <div class="sidebar-label" id="lb-conditions">실험 조건</div>
  </div>
  <div class="cond-list">
    <button class="condition-btn active" data-cond="c1" id="btn-c1">
      <div class="c-label">C1 — High AA × High MP</div>
      <div class="badge-row">
        <span class="badge aa-h" id="b-aah-1"></span>
        <span class="badge mp-h" id="b-mph-1"></span>
      </div>
      <div class="c-desc" id="lb-c1-desc"></div>
    </button>
    <button class="condition-btn" data-cond="c2" id="btn-c2">
      <div class="c-label">C2 — High AA × Low MP</div>
      <div class="badge-row">
        <span class="badge aa-h" id="b-aah-2"></span>
        <span class="badge mp-l" id="b-mpl-2"></span>
      </div>
      <div class="c-desc" id="lb-c2-desc"></div>
    </button>
    <button class="condition-btn" data-cond="c3" id="btn-c3">
      <div class="c-label">C3 — Low AA × High MP</div>
      <div class="badge-row">
        <span class="badge aa-l" id="b-aal-3"></span>
        <span class="badge mp-h" id="b-mph-3"></span>
      </div>
      <div class="c-desc" id="lb-c3-desc"></div>
    </button>
    <button class="condition-btn" data-cond="c4" id="btn-c4">
      <div class="c-label">C4 — Low AA × Low MP</div>
      <div class="badge-row">
        <span class="badge aa-l" id="b-aal-4"></span>
        <span class="badge mp-l" id="b-mpl-4"></span>
      </div>
      <div class="c-desc" id="lb-c4-desc"></div>
    </button>
  </div>
  <div class="sidebar-divider"></div>
  <div class="sidebar-note" id="lb-note"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="tab-row">
    <button class="tab-btn active" id="tab-chat" data-tab="chat"></button>
    <button class="tab-btn" id="tab-survey" data-tab="survey"></button>
  </div>
  <div class="chat-header" id="chat-header-wrap">
    <div class="agent-avatar">✦</div>
    <div>
      <div class="h-name">
        VideoAI
        <span class="condition-tag" id="condition-tag">C1</span>
        <span class="aa-tag high" id="aa-loading-tag"></span>
      </div>
      <div class="h-status" id="lb-agent-status"></div>
    </div>
  </div>
  <div class="chat-messages" id="chat-messages">
    <div class="msg-row system-row show">
      <div class="system-label" id="lb-start-hint"></div>
    </div>
  </div>
  <div class="typing-wrap" id="typing-wrap">
    <div class="typing-row">
      <div style="width:28px;flex-shrink:0"></div>
      <div class="typing-dots" id="typing"><span></span><span></span><span></span></div>
    </div>
    <div class="proc-status" id="proc-status">
      <div class="proc-dot"></div>
      <span id="proc-text"></span>
    </div>
  </div>
  <div class="chat-footer" id="chat-footer-wrap">
    <button class="play-btn" id="play-btn"></button>
    <button class="reset-btn" id="reset-btn"></button>
    <span class="footer-info" id="footer-info">C1</span>
  </div>
  <div class="survey-section" id="survey-section"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  VIDEO URLS
// ═══════════════════════════════════════════════════════════
const VIDEO_URLS = {
  c1: 'vedio_sample/high_pressure.mp4',
  c2: 'vedio_sample/low_pressure.mp4',
  c3: 'vedio_sample/high_pressure.mp4',
  c4: 'vedio_sample/low_pressure.mp4',
};

// ═══════════════════════════════════════════════════════════
//  AA LOADING CONFIG
//  High AA = long loading (multiple proc steps, progress bar)
//  Low AA  = near-instant (very short delay only)
// ═══════════════════════════════════════════════════════════
const AA_CONFIG = {
  high: {
    thinkDelay: 2800,
    editDelay:  3200,
    renderDelay: 4000,
    procThink:  ['ko_think','en_think','zh_think'],
    procEdit:   ['ko_edit','en_edit','zh_edit'],
    procRender: ['ko_render','en_render','zh_render'],
  },
  low: {
    thinkDelay: 380,
    editDelay:  420,
    renderDelay: 600,
  }
};

// ═══════════════════════════════════════════════════════════
//  PROCESSING MESSAGES
// ═══════════════════════════════════════════════════════════
const PROC = {
  ko:{
    think:  ['대규모 데이터 분석 중...','문맥 및 의도 파악 중...','최적 응답 계산 중...','응답 생성 완료'],
    edit:   ['클립 데이터 처리 중...','편집 구조 최적화 중...','타임라인 알고리즘 적용 중...','편집 완료'],
    render: ['고화질 렌더링 중...','영상 인코딩 중...','최종 출력 처리 중...','완성'],
  },
  en:{
    think:  ['Analyzing large-scale data...','Parsing context & intent...','Calculating optimal response...','Response ready'],
    edit:   ['Processing clip data...','Optimizing edit structure...','Applying timeline algorithm...','Edit complete'],
    render: ['High-quality rendering...','Encoding video...','Finalizing output...','Complete'],
  },
  zh:{
    think:  ['正在分析大规模数据...','解析上下文与意图...','计算最优回复...','回复已生成'],
    edit:   ['处理片段数据...','优化剪辑结构...','应用时间线算法...','剪辑完成'],
    render: ['高质量渲染中...','编码视频...','最终输出处理中...','完成'],
  },
};

// ═══════════════════════════════════════════════════════════
//  I18N
// ═══════════════════════════════════════════════════════════
const T = {
  ko:{
    conditions:'실험 조건',
    aa_h:'High AA (긴 로딩)', aa_l:'Low AA (즉시 응답)',
    mp_h:'High MP (할로윈)', mp_l:'Low MP (놀이공원)',
    c1_desc:'할로윈 창피 영상 · High AA (긴 로딩)',
    c2_desc:'놀이공원 추억 영상 · High AA (긴 로딩)',
    c3_desc:'할로윈 창피 영상 · Low AA (즉시 응답)',

const SYSTEM_MSG = {ko:'채팅이 시작되었습니다.',en:'Chat started.',zh:'对话已开始。'};

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let lang = 'ko';
let currentCondition = 'c1';
let isPlaying = false;
let playTimeout = null;
let procInterval = null;

// Condition metadata
const COND_META = {
  c1: {aa:'high', mp:'h'},
  c2: {aa:'high', mp:'l'},
  c3: {aa:'low',  mp:'h'},
  c4: {aa:'low',  mp:'l'},
};

function i(k){ return T[lang][k] || k; }
function isHighAA(){ return COND_META[currentCondition].aa === 'high'; }
function isHighMP(){ return COND_META[currentCondition].mp === 'h'; }
function mpKey(){ return isHighMP() ? 'h' : 'l'; }

function getDelay(type){
  const cfg = isHighAA() ? AA_CONFIG.high : AA_CONFIG.low;
  if(type==='think') return cfg.thinkDelay;
  if(type==='edit')  return cfg.editDelay;
  return cfg.renderDelay;
}

// ═══════════════════════════════════════════════════════════
//  LANG
// ═══════════════════════════════════════════════════════════
function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[data-lang='${l}']`).classList.add('active');
  const fonts = {ko:'var(--font-ko)', en:'var(--font-en)', zh:'var(--font-zh)'};
  document.body.style.fontFamily = fonts[l];
  document.querySelectorAll('.lang-btn,.tab-btn,.play-btn,.reset-btn,.decide-btn,.choice-btn,.survey-submit').forEach(el=>el.style.fontFamily=fonts[l]);
  applyI18n();
  resetChat();
}

function applyI18n(){
  const L = T[lang];
  document.getElementById('lb-conditions').textContent = L.conditions;
  const bmap = {
    'b-aah-1':'aa_h','b-aah-2':'aa_h','b-aal-3':'aa_l','b-aal-4':'aa_l',
    'b-mph-1':'mp_h','b-mpl-2':'mp_l','b-mph-3':'mp_h','b-mpl-4':'mp_l'
  };
  Object.entries(bmap).forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.textContent=L[key];});
  ['c1','c2','c3','c4'].forEach(c=>{
    const el=document.getElementById('lb-'+c+'-desc');
    if(el) el.textContent=L[c+'_desc'];
  });
  document.getElementById('lb-note').innerHTML = L.note.replace(/\n/g,'<br>');
  document.getElementById('tab-chat').textContent = L.tab_chat;
  document.getElementById('tab-survey').textContent = L.tab_survey;
  document.getElementById('lb-agent-status').textContent = L.agent_status;
  const sh = document.getElementById('lb-start-hint');
  if(sh) sh.textContent = L.start_hint;
  document.getElementById('play-btn').textContent = L.btn_start;
  document.getElementById('reset-btn').textContent = L.btn_reset;
  updateAATag();
  renderSurvey();
}

function updateAATag(){
  const tag = document.getElementById('aa-loading-tag');
  const hi = isHighAA();
  tag.textContent = hi ? i('aa_loading_high') : i('aa_loading_low');
  tag.className = 'aa-tag ' + (hi ? 'high' : 'low');
}

// ═══════════════════════════════════════════════════════════
//  CONDITIONS / TABS
// ═══════════════════════════════════════════════════════════
function selectCondition(c){
  if(isPlaying) return;
  currentCondition = c;
  document.querySelectorAll('.condition-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+c).classList.add('active');
  document.getElementById('condition-tag').textContent = c.toUpperCase();
  document.getElementById('footer-info').textContent = c.toUpperCase() + ' · ' + (isHighAA() ? 'High AA' : 'Low AA') + ' × ' + (isHighMP() ? 'High MP' : 'Low MP');
  updateAATag();
  resetChat();
}

function switchTab(tab){
  ['chat','survey'].forEach(t => document.getElementById('tab-'+t).classList.toggle('active', t===tab));
  const isChat = tab === 'chat';
  ['chat-header-wrap','chat-messages','chat-footer-wrap'].forEach(id => {
    document.getElementById(id).style.display = isChat ? '' : 'none';
  });
  document.getElementById('typing-wrap').style.display = isChat ? '' : 'none';
  document.getElementById('survey-section').className = 'survey-section' + (isChat ? '' : ' active');
}

// ═══════════════════════════════════════════════════════════
//  PROC STATUS
// ═══════════════════════════════════════════════════════════
function showProc(type){
  if(procInterval) clearInterval(procInterval);
  const typeMap = {think:'think', edit:'edit', render:'render'};
  const msgs = PROC[lang][typeMap[type]] || PROC[lang].think;
  let pi = 0;
  document.getElementById('proc-text').textContent = msgs[0];
  document.getElementById('proc-status').classList.add('visible');
  procInterval = setInterval(()=>{
    pi = (pi+1) % msgs.length;
    document.getElementById('proc-text').textContent = msgs[pi];
  }, isHighAA() ? 750 : 300);
}
function hideProc(){
  if(procInterval){clearInterval(procInterval);procInterval=null;}
  document.getElementById('proc-status').classList.remove('visible');
}

// ═══════════════════════════════════════════════════════════
//  CHAT HELPERS
// ═══════════════════════════════════════════════════════════
function setTyping(v){ document.getElementById('typing').classList.toggle('visible', v); }
function scrollBottom(){ const el=document.getElementById('chat-messages'); el.scrollTop=el.scrollHeight; }

function appendEl(el){
  document.getElementById('chat-messages').appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  scrollBottom();
}

function makeBubble(role, html){
  const w = document.createElement('div');
  w.className = 'msg-row' + (role==='user' ? ' user' : role==='system-row' ? ' system-row' : ' ai');
  if(role==='system-row') w.innerHTML=`<div class="system-label">${html}</div>`;
  else if(role==='user')  w.innerHTML=`<div class="bubble user">${html}</div>`;
  else                    w.innerHTML=`<div class="avatar-sm">✦</div><div class="bubble ai">${html}</div>`;
  return w;
}

function makeResultCard(bodyText, turns){
  const w = document.createElement('div');
  w.className = 'msg-row ai';
  const url = VIDEO_URLS[currentCondition];
  const hasLink = url && url.trim() !== '';
  const mediaEl = hasLink
    ? `<video src="${url}" controls playsinline style="width:100%;border-radius:8px;margin-top:10px;max-height:220px;background:#000;"></video>`
    : `<span style="display:inline-block;margin-top:10px;padding:7px 14px;background:#aaa;color:#fff;border-radius:8px;font-size:12px;">${i('no_video')}</span>`;
  w.innerHTML = `<div class="avatar-sm">✦</div><div class="result-card">
    <div class="rc-label">${i('video_done')}</div>
    <div class="rc-title">${bodyText}</div>
    <div class="rc-body">${i('total_turns')}${turns}${i('turns_label')}</div>
    ${mediaEl}</div>`;
  return w;
}

function makeDecideCard(text){
  const w = document.createElement('div');
  w.className = 'msg-row user';
  w.innerHTML = `<div class="decision-card user-decide"><div class="card-label">${i('user_decision')}</div><div class="card-body">${text}</div></div>`;
  return w;
}

function makeStepLabel(text){
  const w = document.createElement('div');
  w.className = 'msg-row system-row';
  w.innerHTML = `<div class="system-label" style="background:var(--accent-light);color:var(--accent);font-weight:600;">${text}</div>`;
  return w;
}

// ═══════════════════════════════════════════════════════════
//  CHOICE WIDGET
// ═══════════════════════════════════════════════════════════
function showChoices(choices){
  return new Promise(resolve => {
    const row = document.createElement('div');
    row.className = 'choice-row';
    choices.forEach((txt) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = txt;
      btn.onclick = () => {
        row.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        row.classList.add('disabled');
        setTimeout(()=>resolve(txt), 300);
      };
      row.appendChild(btn);
    });
    document.getElementById('chat-messages').appendChild(row);
    requestAnimationFrame(()=>requestAnimationFrame(()=>row.classList.add('show')));
    scrollBottom();
  });
}

function showDecide(){
  return new Promise(resolve => {
    const row = document.createElement('div');
    row.className = 'decide-row';
    const btn = document.createElement('button');
    btn.className = 'decide-btn';
    btn.textContent = i('confirm_label');
    btn.onclick = () => { btn.disabled=true; setTimeout(()=>resolve(), 300); };
    row.appendChild(btn);
    document.getElementById('chat-messages').appendChild(row);
    requestAnimationFrame(()=>requestAnimationFrame(()=>row.classList.add('show')));
    scrollBottom();
  });
}

// ═══════════════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════════════
function resetChat(){
  if(playTimeout) clearTimeout(playTimeout);
  hideProc(); isPlaying=false; setTyping(false);
  const pb = document.getElementById('play-btn');
  pb.disabled=false; pb.textContent=i('btn_start'); pb.setAttribute('data-mode','start');
  document.getElementById('chat-messages').innerHTML =
    `<div class="msg-row system-row show"><div class="system-label">${i('start_hint')}</div></div>`;
}

// ═══════════════════════════════════════════════════════════
//  SIMULATION
// ═══════════════════════════════════════════════════════════
function delay(ms){ return new Promise(r=>{ playTimeout=setTimeout(r,ms); }); }

async function aiReply(text, procType){
  setTyping(true); showProc(procType); scrollBottom();
  await delay(getDelay(procType));
  hideProc(); setTyping(false);
  appendEl(makeBubble('ai', text.replace(/\n/g,'<br>')));
  await delay(700);
}

async function startSimulation(){
  if(isPlaying) return;
  isPlaying = true;
  const pb = document.getElementById('play-btn'); pb.disabled=true;
  document.getElementById('chat-messages').innerHTML='';

  const mp = mpKey(); // 'h' or 'l'
  const pfx = `chat_mp_${mp}_`;

  // System message
  appendEl(makeBubble('system-row', SYSTEM_MSG[lang]));
  await delay(400);

  // AI greeting
  await aiReply(i(pfx+'open'), 'think');

  // ── STEP 1 ──
  appendEl(makeStepLabel(i('step1_label')));
  await delay(200);
  appendEl(makeBubble('ai', i(pfx+'s1_intro')));
  await delay(300);
  const s1 = await showChoices(T[lang][pfx+'s1_choices']);
  appendEl(makeBubble('user', s1));
  await delay(300);
  await aiReply(i(pfx+'s1_ai'), 'edit');

  // ── STEP 2 ──
  appendEl(makeStepLabel(i('step2_label')));
  await delay(200);
  const s2 = await showChoices(T[lang][pfx+'s2_choices']);
  appendEl(makeBubble('user', s2));
  await delay(300);
  await aiReply(i(pfx+'s2_ai'), 'edit');

  // ── STEP 3 ──
  appendEl(makeStepLabel(i('step3_label')));
  await delay(200);
  const s3 = await showChoices(T[lang][pfx+'s3_choices']);
  appendEl(makeBubble('user', s3));
  await delay(300);
  await aiReply(i(pfx+'s3_ai'), 'think');

  // ── FINAL CONFIRM ──
  await showDecide();
  appendEl(makeDecideCard(i(pfx+'decide')));
  await delay(500);

  // ── RESULT ──
  setTyping(true); showProc('render'); scrollBottom();
  await delay(getDelay('render'));
  hideProc(); setTyping(false);
  appendEl(makeResultCard(i(pfx+'result'), 3));
  await delay(400);

  isPlaying = false;
  pb.disabled=false; pb.textContent=i('btn_replay'); pb.setAttribute('data-mode','replay');
}

// ═══════════════════════════════════════════════════════════
//  SURVEY — formal version per document
// ═══════════════════════════════════════════════════════════
function renderSurvey(){
  const L = T[lang];
  const cond = currentCondition;

  function likertRow(name, idx, codes, reverse){
    const opts = Array.from({length:7},(_,v)=>
      `<label class="likert-opt"><input type="radio" name="${name}${idx}" value="${v+1}"><div class="likert-circle">${v+1}</div></label>`
    ).join('');
    return `<div class="likert-wrap">
      <span class="likert-end">${L.scale_lo}</span>
      <div class="likert-options">${opts}</div>
      <span class="likert-end r">${L.scale_hi}</span>
    </div>`;
  }

  function makeItems(qs, codes, reverse, prefix){
    return qs.map((q,j)=>{
      const rev = reverse[j] ? `<span class="item-reverse">▼ ${L.reverse_note}</span>` : '';
      return `<div class="survey-item">
        <div class="survey-q"><span class="q-num">${codes[j]}</span> ${q} ${rev}</div>
        ${likertRow(prefix, j, codes, reverse[j])}
      </div>`;
    }).join('');
  }

  const scenarioText = L[`scenario_${cond}`] || '';
  const aaNote = isHighAA()
    ? (lang==='ko' ? '※ High AA 조건: 매 선택마다 AI가 오랜 시간 데이터를 처리했습니다.'
       : lang==='zh' ? '※ 高AI自主性条件：每次选择时，AI均经过了长时间数据处理。'
       : '※ High AA condition: The AI took a significant amount of time processing data at each step.')
    : (lang==='ko' ? '※ Low AA 조건: 매 선택마다 AI가 거의 즉시 응답했습니다.'
       : lang==='zh' ? '※ 低AI自主性条件：每次选择时，AI均几乎即时响应。'
       : '※ Low AA condition: The AI responded almost instantly at each step.');

  document.getElementById('survey-section').innerHTML = `
    <div class="survey-header">
      <h2>${L.survey_title}</h2>
      <p>${L.survey_sub}</p>
    </div>

    <!-- Scenario display -->
    <div class="survey-block">
      <div class="survey-block-title">${L.scenario_label} — ${cond.toUpperCase()}</div>
      <div class="scenario-box">
        <div class="scenario-box-label">${cond.toUpperCase()} · ${isHighAA() ? L.aa_h : L.aa_l} · ${isHighMP() ? L.mp_h : L.mp_l}</div>
        ${scenarioText}
      </div>
      <div class="note-box">${aaNote}</div>
    </div>

    <!-- Q4 IV1 -->
    <div class="survey-block">
      <div class="survey-block-title">${L.iv1_section}</div>
      <p style="font-size:12px;color:var(--system-text);margin-bottom:16px;line-height:1.6;">${L.iv1_sub}<br><span style="font-size:10.5px;opacity:.7;">${L.iv1_ref}</span></p>
      ${makeItems(L.iv1_q, L.iv1_codes, L.iv1_reverse, 'iv1_')}
    </div>

    <!-- Q5 MC -->
    <div class="survey-block">
      <div class="survey-block-title">${L.mc_section}</div>
      <p style="font-size:12px;color:var(--system-text);margin-bottom:16px;line-height:1.6;">${L.mc_sub}<br><span style="font-size:10.5px;opacity:.7;">${L.mc_ref}</span></p>
      ${makeItems(L.mc_q, L.mc_codes, L.mc_reverse, 'mc_')}
    </div>

    <!-- Q6 MV -->
    <div class="survey-block">
      <div class="survey-block-title">${L.mv_section}</div>
      <p style="font-size:12px;color:var(--system-text);margin-bottom:16px;line-height:1.6;">${L.mv_sub}<br><span style="font-size:10.5px;opacity:.7;">${L.mv_ref}</span></p>
      ${makeItems(L.mv_q, L.mv_codes, L.mv_reverse, 'mv_')}
    </div>

    <!-- Q7 DV -->
    <div class="survey-block">
      <div class="survey-block-title">${L.dv_section}</div>
      <p style="font-size:12px;color:var(--system-text);margin-bottom:16px;line-height:1.6;">${L.dv_sub}<br><span style="font-size:10.5px;opacity:.7;">${L.dv_ref}</span></p>
      ${makeItems(L.dv_q, L.dv_codes, L.dv_reverse, 'dv_')}
    </div>

    <button class="survey-submit" id="survey-submit-btn">${L.submit}</button>
  `;

  const sb = document.getElementById('survey-submit-btn');
  if(sb) sb.onclick = () => alert(L.submit_done);
}

// ═══════════════════════════════════════════════════════════
//  INIT — bind all events, no inline onclick
// ═══════════════════════════════════════════════════════════
function bindEvents() {
  // Lang buttons
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { setLang(btn.getAttribute('data-lang')); });
  });
  // Condition buttons
  document.querySelectorAll('.condition-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { selectCondition(btn.getAttribute('data-cond')); });
  });
  // Tab buttons
  document.getElementById('tab-chat').addEventListener('click', function() { switchTab('chat'); });
  document.getElementById('tab-survey').addEventListener('click', function() { switchTab('survey'); });
  // Play / Reset
  document.getElementById('play-btn').addEventListener('click', function() {
    var pb = document.getElementById('play-btn');
    if(pb.getAttribute('data-mode') === 'replay') { resetChat(); }
    else { startSimulation(); }
  });
  document.getElementById('reset-btn').addEventListener('click', function() { resetChat(); });
}

bindEvents();
applyI18n();
selectCondition('c1');
</script>
</body>
</html>
